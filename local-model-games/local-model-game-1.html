function initMap() {
  const mapId = currentMapId;
  enemies = (MAP_ENEMIES[mapId] || []).map(e => ({
    ...e,
    hp: ENEMY_TYPES[e.type].hp,
    maxHp: ENEMY_TYPES[e.type].hp,
    alive: true,
    moveTimer: Math.random() * 2,
  }));
  items = (MAP_ITEMS[mapId] || []).map(i => ({ ...i }));
}

function startTransition(target) {
  transitioning = true;
  transitionAlpha = 0;
  transitionTarget = target;
}

function updateTransition(dt) {
  transitionAlpha += dt * 2;
  if (transitionAlpha >= 1 && transitionAlpha < 2) {
    currentMapId = transitionTarget.map;
    player.x = transitionTarget.spawnX;
    player.y = transitionTarget.spawnY;
    player.fromX = player.x;
    player.fromY = player.y;
    player.moving = false;
    initMap();
    projectiles = [];
  }
  if (transitionAlpha >= 2) {
    transitioning = false;
    transitionAlpha = 0;
    transitionTarget = null;
  }
}

function drawTransition() {
  if (!transitioning) return;
  const alpha = transitionAlpha <= 1 ? transitionAlpha : 2 - transitionAlpha;
  ctx.fillStyle = `rgba(0,0,0,${Math.min(1, alpha)})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function canMove(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
  const map = currentMap();
  if (SOLID.has(map.tiles[y][x])) return false;
  for (const e of enemies) {
    if (e.alive && e.x === x && e.y === y) return false;
  }
  for (const npc of map.npcs || []) {
    if (npc.x === x && npc.y === y) return false;
  }
  return true;
}

function tryMove(dx, dy) {
  if (player.moving || player.dashing) return;
  const nx = player.x + dx;
  const ny = player.y + dy;
  if (!canMove(nx, ny)) return;
  player.fromX = player.x;
  player.fromY = player.y;
  player.x = nx;
  player.y = ny;
  player.moving = true;
  player.moveT = 0;
  player.dir = dy > 0 ? 0 : dy < 0 ? 3 : dx > 0 ? 2 : 1;
}

function lerp(a, b, t) {
  t = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  return a + (b - a) * t;
}

function getPlayerAtk() {
  let atk = player.baseAtk;
  if (player.equippedWeapon && ITEMS[player.equippedWeapon]) {
    atk += ITEMS[player.equippedWeapon].atk || 0;
  }
  return atk;
}

function spawnParticles(x, y, color, count, speed = 100) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const vel = (Math.random() * 0.5 + 0.5) * speed;
    particles.push({
      x, y,
      vx: Math.cos(angle) * vel,
      vy: Math.sin(angle) * vel,
      life: 0.5 + Math.random() * 0.5,
      color,
      size: 3 + Math.random() * 3,
    });
  }
}

function spawnDamageFloat(x, y, text, color) {
  damageFloats.push({ x: x * TILE + 16, y: y * TILE, text, color, timer: 1 });
}

function startDash() {
  if (player.dashing || player.attackCooldown > 0) return;
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  const [dx, dy] = dirs[player.dir];
  let endX = player.x, endY = player.y;
  for (let i = 0; i < player.dashDist; i++) {
    const nx = endX + dx, ny = endY + dy;
    if (!canMove(nx, ny)) break;
    const map = currentMap();
    if (SOLID.has(map.tiles[ny][nx])) break;
    for (const npc of map.npcs || []) {
      if (npc.x === nx && npc.y === ny) { endX = nx; endY = ny; i = player.dashDist; break; }
    }
    endX = nx; endY = ny;
  }
  if (endX === player.x && endY === player.y) return;
  player.dashing = true;
  player.dashTimer = 0;
  player.dashFromX = player.x;
  player.dashFromY = player.y;
  player.dashToX = endX;
  player.dashToY = endY;
  player.iFrames = 0.2;
  afterimages.push({ x: player.x, y: player.y, timer: 0.3, color: '#4a6aaa' });
  const weaponColor = player.equippedWeapon ? ITEMS[player.equippedWeapon].color : '#aaaaff';
  spawnParticles(player.x * TILE + 16, player.y * TILE + 16, weaponColor, 8, 150);
}

function updateDash(dt) {
  if (!player.dashing) return;
  player.dashTimer += dt;
  const t = player.dashTimer / player.dashDuration;
  player.x = lerp(player.dashFromX, player.dashToX, Math.min(1, t));
  player.y = lerp(player.dashFromY, player.dashToY, Math.min(1, t));
  const weaponColor = player.equippedWeapon ? ITEMS[player.equippedWeapon].color : '#aaaaff';
  spawnParticles(player.x * TILE + 16, player.y * TILE + 16, weaponColor, 2, 80);
  for (const e of enemies) {
    if (!e.alive) continue;
    const ex = Math.round(e.x), ey = Math.round(e.y);
    if (player.x === ex && player.y === ey) {
      dealDamageToEnemy(e, getPlayerAtk() + 2);
    }
  }
  if (player.dashTimer >= player.dashDuration) {
    player.x = player.dashToX;
    player.y = player.dashToY;
    player.dashing = false;
    player.attackCooldown = 0.3;
  }
}

function dealDamageToEnemy(enemy, dmg) {
  enemy.hp -= dmg;
  spawnParticles(enemy.x * TILE + 16, enemy.y * TILE + 16, '#fff', 6, 120);
  spawnDamageFloat(enemy.x, enemy.y, `-${dmg}`, '#fff');
  if (enemy.hp <= 0) {
    enemy.alive = false;
    player.xp += ENEMY_TYPES[enemy.type].xp;
    spawnParticles(enemy.x * TILE + 16, enemy.y * TILE + 16, ENEMY_TYPES[enemy.type].color, 12, 150);
    spawnDamageFloat(enemy.x, enemy.y - 0.5, `+${ENEMY_TYPES[enemy.type].xp} XP`, '#f1c40f');
    checkLevelUp();
    const drops = ENEMY_TYPES[enemy.type].drops;
    const drop = drops[Math.floor(Math.random() * drops.length)];
    if (drop) items.push({ x: enemy.x, y: enemy.y, item: drop });
  }
}

function checkLevelUp() {
  while (player.xp >= player.maxXp) {
    player.xp -= player.maxXp;
    player.level++;
    player.maxHp += 5;
    player.hp = player.maxHp;
    player.maxMp += 3;
    player.mp = player.maxMp;
    player.baseAtk += 1;
    player.maxXp = Math.floor(player.maxXp * 1.5);
    showMessage(`Level Up! Now Lv.${player.level}`);
  }
}

function shootGun() {
  if (!player.hasGun || player.gunCooldown > 0) return;
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  const [dx, dy] = dirs[player.dir];
  projectiles.push({
    x: player.x * TILE + 16 + dx * 16,
    y: player.y * TILE + 16 + dy * 16,
    vx: dx * 400,
    vy: dy * 400,
    life: 1.5,
    dmg: Math.floor(getPlayerAtk() * 0.8) + 2,
    trail: [],
  });
  spawnParticles(player.x * TILE + 16, player.y * TILE + 16, '#4a9aaa', 4, 80);
  player.gunCooldown = 0.4;
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 8) p.trail.shift();
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) {
      spawnParticles(p.x, p.y, '#4a9aaa', 5, 80);
      projectiles.splice(i, 1);
      continue;
    }
    const tx = Math.floor(p.x / TILE), ty = Math.floor(p.y / TILE);
    const map = currentMap();
    if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS || SOLID.has(map.tiles[ty]?.[tx])) {
      spawnParticles(p.x, p.y, '#4a9aaa', 5, 80);
      projectiles.splice(i, 1);
      continue;
    }
    for (const e of enemies) {
      if (!e.alive) continue;
      const dist = Math.hypot(e.x * TILE + 16 - p.x, e.y * TILE + 16 - p.y);
      if (dist < 20) {
        dealDamageToEnemy(e, p.dmg);
        spawnParticles(p.x, p.y, '#4a9aaa', 5, 80);
        projectiles.splice(i, 1);
        break;
      }
    }
  }
}

function tryPickupItem() {
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    if (it.x === player.x && it.y === player.y) {
      if (it.item === 'gun') {
        player.hasGun = true;
        showMessage('Soul Pistol acquired! Press F to fire.');
      } else {
        player.inventory.push(it.item);
        showMessage(`Picked up ${ITEMS[it.item].name}!`);
      }
      items.splice(i, 1);
    }
  }
}

function checkScreenTransition() {
  const map = currentMap();
  const exits = map.exits || {};
  const exitTiles = map.exitTiles || {};
  for (const [dir, exit] of Object.entries(exits)) {
    let valid = false;
    const tiles = exitTiles[dir] || [];
    if (dir === 'north' && player.y === 0 && tiles.includes(player.x)) valid = true;
    if (dir === 'south' && player.y === ROWS - 1 && tiles.includes(player.x)) valid = true;
    if (dir === 'west' && player.x === 0 && tiles.includes(player.y)) valid = true;
    if (dir === 'east' && player.x === COLS - 1 && tiles.includes(player.y)) valid = true;
    if (valid) {
      startTransition({ map: exit.map, spawnX: exit.spawnX, spawnY: exit.spawnY });
      return;
    }
  }
}

function checkDoorPortalAuto() {
  const map = currentMap();
  const tile = map.tiles[player.y]?.[player.x];
  if (tile !== 5 && tile !== 22) return;
  const portals = DOOR_PORTALS[currentMapId];
  if (!portals) return;
  for (const p of portals) {
    if (p.x === player.x && p.y === player.y) {
      if (p.locked && !hasFlag(p.unlockFlag)) {
        showMessage(p.lockedMsg || "It's locked.");
        return;
      }
      startTransition({ map: p.map, spawnX: p.spawnX, spawnY: p.spawnY });
      return;
    }
  }
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (!e.alive) continue;
    e.moveTimer -= dt * ENEMY_TYPES[e.type].speed;
    if (e.moveTimer > 0) continue;
    e.moveTimer = 1.5 + Math.random();
    const dist = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
    let dx = 0, dy = 0;
    if (dist < 6) {
      if (player.x < e.x) dx = -1;
      else if (player.x > e.x) dx = 1;
      if (player.y < e.y) dy = -1;
      else if (player.y > e.y) dy = 1;
      if (dx !== 0 && dy !== 0) dy = 0;
    } else {
      const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
      const d = dirs[Math.floor(Math.random() * 4)];
      dx = d[0]; dy = d[1];
    }
    const nx = e.x + dx, ny = e.y + dy;
    if (canMove(nx, ny)) {
      e.x = nx; e.y = ny;
    }
    if (Math.abs(e.x - player.x) + Math.abs(e.y - player.y) === 1 && player.iFrames <= 0) {
      player.hp -= ENEMY_TYPES[e.type].atk;
      player.hurtTimer = 0.2;
      player.iFrames = 0.5;
      spawnDamageFloat(player.x, player.y, `-${ENEMY_TYPES[e.type].atk}`, '#e74c3c');
      spawnParticles(player.x * TILE + 16, player.y * TILE + 16, '#e74c3c', 8, 100);
      if (player.hp <= 0) {
        player.hp = player.maxHp;
        player.x = 9; player.y = 9;
        player.fromX = 9; player.fromY = 9;
        player.moving = false;
        currentMapId = 'village';
        initMap();
        showMessage('You were defeated and returned to the village...');
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life -= dt;
    p.size *= 0.97;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = afterimages.length - 1; i >= 0; i--) {
    afterimages[i].timer -= dt;
    if (afterimages[i].timer <= 0) afterimages.splice(i, 1);
  }
  for (let i = damageFloats.length - 1; i >= 0; i--) {
    damageFloats[i].y -= dt * 30;
    damageFloats[i].timer -= dt;
    if (damageFloats[i].timer <= 0) damageFloats.splice(i, 1);
  }
}

function showMessage(text) {
  messageText = text;
  messageTimer = 2.5;
}

function drawTile(x, y) {
  const t = currentMap().tiles[y][x];
  const px = x * TILE, py = y * TILE;
  if (t === 1) {
    ctx.fillStyle = (x + y) % 2 === 0 ? C.dungeonFloor : C.dungeonFloor2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(px + 4, py + 4, 8, 8);
    return;
  }
  if (t === 2) {
    ctx.fillStyle = C.water;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(px + ((Date.now() / 500 + x * 3) % TILE), py + 8, 6, 2);
    return;
  }
  if (t === 3) {
    ctx.fillStyle = (x + y) % 2 === 0 ? C.path : '#3a3028';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(px + (x * 7 % 20), py + (y * 11 % 20), 6, 2);
    return;
  }
  if (t === 4) {
    ctx.fillStyle = (x + y) % 2 === 0 ? C.grass : C.grass2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.03)';
    ctx.fillRect(px + (x * 5 % 18), py + (y * 7 % 18), 4, 4);
    return;
  }
  if (t === 5) {
    ctx.fillStyle = (x + y) % 2 === 0 ? C.grass : C.grass2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = C.door;
    ctx.fillRect(px + 8, py + 4, 16, 24);
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(px + 14, py + 14, 4, 4);
    return;
  }
  if (t === 6) {
    ctx.fillStyle = C.roof;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.moveTo(px + 16, py + 4);
    ctx.lineTo(px + 4, py + 20);
    ctx.lineTo(px + 28, py + 20);
    ctx.closePath();
    ctx.fill();
    return;
  }
  if (t === 18) {
    ctx.fillStyle = C.caveFloor;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(px + (x * 7 % 20), py + (y * 11 % 20), 6, 2);
    return;
  }
  if (t === 19) {
    ctx.fillStyle = C.cryptWall;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(px + 8, py + 8, 16, 16);
    const pulse = Math.sin(Date.now() / 800 + x + y) * 0.15 + 0.15;
    ctx.fillStyle = `rgba(90, 60, 100, ${pulse})`;
    ctx.fillRect(px + 12, py + 12, 8, 8);
    return;
  }
  if (t === 20) {
    ctx.fillStyle = (x + y) % 2 === 0 ? C.cryptFloor : C.cryptFloor2;
    ctx.fillRect(px, py, TILE, TILE);
    return;
  }
  if (t === 21) {
    ctx.fillStyle = (x + y) % 2 === 0 ? C.grass : C.corruptedGrass;
    ctx.fillRect(px, py, TILE, TILE);
    const glow = Math.sin(Date.now() / 600 + x + y) * 0.2 + 0.3;
    ctx.fillStyle = `rgba(80, 40, 80, ${glow})`;
    ctx.beginPath();
    ctx.arc(px + 16, py + 16, 8, 0, Math.PI * 2);
    ctx.fill();
    return;
  }
  if (t === 22) {
    ctx.fillStyle = (x + y) % 2 === 0 ? C.cryptFloor : C.cryptFloor2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = C.door;
    ctx.fillRect(px + 8, py + 4, 16, 24);
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(px + 14, py + 14, 4, 4);
    return;
  }
  ctx.fillStyle = (x + y) % 2 === 0 ? C.grass : C.grass2;
  ctx.fillRect(px, py, TILE, TILE);
}

function drawTree(x, y) {
  const px = x * TILE, py = y * TILE;
  ctx.fillStyle = C.trunk;
  ctx.fillRect(px + 12, py + 20, 8, 12);
  ctx.fillStyle = C.tree;
  ctx.beginPath();
  ctx.arc(px + 16, py + 14, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.arc(px + 14, py + 12, 8, 0, Math.PI * 2);
  ctx.fill();
}

function drawCharacter(x, y, color, dir, frame) {
  const px = x * TILE, py = y * TILE;
  ctx.fillStyle = C.shadow;
  ctx.beginPath();
  ctx.ellipse(px + 16, py + 30, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  const bob = Math.sin(frame * Math.PI * 0.5) * 1.5;
  ctx.fillStyle = color;
  ctx.fillRect(px + 8, py + 10 + bob, 16, 16);
  ctx.fillStyle = '#c8a878';
  ctx.fillRect(px + 10, py + 2 + bob, 12, 12);
  ctx.fillStyle = '#2a2a2a';
  if (dir === 0) {
    ctx.fillRect(px + 12, py + 6 + bob, 3, 3);
    ctx.fillRect(px + 17, py + 6 + bob, 3, 3);
  } else if (dir === 3) {
    ctx.fillStyle = color;
    ctx.fillRect(px + 10, py + 2 + bob, 12, 5);
  } else if (dir === 1) {
    ctx.fillRect(px + 11, py + 6 + bob, 3, 3);
  } else {
    ctx.fillRect(px + 18, py + 6 + bob, 3, 3);
  }
  ctx.fillStyle = '#3a2a2a';
  ctx.fillRect(px + 10, py + 26 + bob, 5, 6);
  ctx.fillRect(px + 17, py + 26 + bob, 5, 6);
}

function drawNPC(npc) {
  drawCharacter(npc.x, npc.y, npc.color, npc.dir, player.animFrame);
  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(npc.name, npc.x * TILE + 16, npc.y * TILE - 4);
  ctx.textAlign = 'left';
}

function drawEnemy(e) {
  const px = e.x * TILE, py = e.y * TILE;
  ctx.fillStyle = C.shadow;
  ctx.beginPath();
  ctx.ellipse(px + 16, py + 30, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  const bob = Math.sin(Date.now() / 300 + e.x) * 2;
  if (e.type === 'shade') {
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = ENEMY_TYPES.shade.color;
    ctx.beginPath();
    ctx.ellipse(px + 16, py + 18 + bob, 12, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(px + 11, py + 14 + bob, 3, 3);
    ctx.fillRect(px + 18, py + 14 + bob, 3, 3);
    ctx.globalAlpha = 1;
  } else if (e.type === 'skeleton') {
    ctx.fillStyle = ENEMY_TYPES.skeleton.color;
    ctx.fillRect(px + 10, py + 8 + bob, 12, 14);
    ctx.beginPath();
    ctx.arc(px + 16, py + 6 + bob, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.fillRect(px + 12, py + 4 + bob, 2, 2);
    ctx.fillRect(px + 18, py + 4 + bob, 2, 2);
    ctx.fillStyle = ENEMY_TYPES.skeleton.color;
    ctx.fillRect(px + 8, py + 12 + bob, 4, 2);
    ctx.fillRect(px + 20, py + 12 + bob, 4, 2);
    ctx.fillRect(px + 11, py + 22 + bob, 4, 8);
    ctx.fillRect(px + 17, py + 22 + bob, 4, 8);
  } else if (e.type === 'spider') {
    ctx.strokeStyle = ENEMY_TYPES.spider.color;
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI + Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(px + 16, py + 16 + bob);
      ctx.lineTo(px + 16 + Math.cos(angle) * 14, py + 16 + Math.sin(angle) * 14 + bob);
      ctx.stroke();
    }
    ctx.fillStyle = ENEMY_TYPES.spider.color;
    ctx.beginPath();
    ctx.ellipse(px + 16, py + 16 + bob, 10, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(px + 12, py + 14 + bob, 3, 3);
    ctx.fillRect(px + 17, py + 14 + bob, 3, 3);
  } else if (e.type === 'wraith') {
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = ENEMY_TYPES.wraith.color;
    ctx.beginPath();
    ctx.moveTo(px + 16, py + 4 + bob);
    ctx.lineTo(px + 4, py + 28 + bob);
    ctx.lineTo(px + 28, py + 28 + bob);
    ctx.closePath();
    ctx.fill();
    const glow = Math.sin(Date.now() / 400) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(150, 80, 180, ${glow})`;
    ctx.beginPath();
    ctx.arc(px + 16, py + 18 + bob, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff66ff';
    ctx.fillRect(px + 12, py + 16 + bob, 3, 3);
    ctx.fillRect(px + 17, py + 16 + bob, 3, 3);
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(px + 8, py - 6, 16 * e.hp / e.maxHp, 3);
  ctx.fillStyle = '#555';
  ctx.fillRect(px + 8, py - 6, 16, 3);
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(px + 8, py - 6, 16 * e.hp / e.maxHp, 3);
}

function drawItemIcon(x, y, itemId, size = 16) {
  const item = ITEMS[itemId];
  const c = item.color;
  if (item.icon === 'herb') {
    ctx.fillStyle = '#3a5a2a';
    ctx.fillRect(x + 7, y + 8, 2, 8);
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(x + 5, y + 6, 4, 0, Math.PI * 2);
    ctx.arc(x + 11, y + 6, 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (item.icon === 'potion') {
    ctx.fillStyle = '#4a3040';
    ctx.fillRect(x + 6, y + 4, 4, 4);
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(x + 8, y + 12, 6, 0, Math.PI * 2);
    ctx.fill();
  } else if (item.icon === 'coin') {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(x + 8, y + 8, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5a4a30';
    ctx.beginPath();
    ctx.arc(x + 8, y + 8, 4, 0, Math.PI * 2);
    ctx.stroke();
  } else if (item.icon === 'sword') {
    ctx.fillStyle = '#5a4a3a';
    ctx.fillRect(x + 7, y + 10, 2, 6);
    ctx.fillStyle = c;
    ctx.fillRect(x + 6, y + 2, 4, 10);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(x + 4, y + 8, 8, 2);
  } else if (item.icon === 'gun') {
    ctx.fillStyle = '#3a4a4a';
    ctx.fillRect(x + 4, y + 6, 10, 6);
    ctx.fillStyle = c;
    ctx.fillRect(x + 2, y + 8, 6, 4);
    ctx.fillRect(x + 14, y + 10, 4, 2);
  } else if (item.icon === 'crystal') {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 2);
    ctx.lineTo(x + 14, y + 14);
    ctx.lineTo(x + 2, y + 14);
    ctx.closePath();
    ctx.fill();
  } else if (item.icon === 'feather') {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 2);
    ctx.quadraticCurveTo(x + 14, y + 8, x + 8, y + 14);
    ctx.quadraticCurveTo(x + 2, y + 8, x + 8, y + 2);
    ctx.fill();
  } else if (item.icon === 'bone') {
    ctx.fillStyle = c;
    ctx.fillRect(x + 2, y + 6, 12, 4);
    ctx.beginPath();
    ctx.arc(x + 2, y + 8, 3, 0, Math.PI * 2);
    ctx.arc(x + 14, y + 8, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (item.icon === 'key') {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(x + 6, y + 6, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(x + 8, y + 4, 8, 4);
    ctx.fillRect(x + 12, y + 8, 2, 4);
    ctx.fillRect(x + 15, y + 8, 2, 3);
  } else if (item.icon === 'seal') {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(x + 8, y + 8, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#8a6aba';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x + 8, y + 8, 5, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawGroundItems() {
  const bob = Math.sin(Date.now() / 400) * 2;
  for (const it of items) {
    const px = it.x * TILE + 8, py = it.y * TILE + 8 + bob;
    ctx.fillStyle = ITEMS[it.item].color;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(it.x * TILE + 16, it.y * TILE + 16, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    drawItemIcon(px, py, it.item);
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    for (let i = 0; i < p.trail.length; i++) {
      const t = p.trail[i];
      ctx.globalAlpha = (i / p.trail.length) * 0.5;
      ctx.fillStyle = '#4a9aaa';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#6acada';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawDamageFloats() {
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  for (const d of damageFloats) {
    ctx.globalAlpha = Math.min(1, d.timer * 2);
    ctx.fillStyle = d.color;
    ctx.fillText(d.text, d.x, d.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawAfterimages() {
  for (const a of afterimages) {
    ctx.globalAlpha = a.timer * 0.5;
    drawCharacter(a.x, a.y, a.color, player.dir, 0);
  }
  ctx.globalAlpha = 1;
}

function drawDashSlash() {
  if (!player.dashing) return;
  const weaponColor = player.equippedWeapon ? ITEMS[player.equippedWeapon].color : '#aaaaff';
  ctx.strokeStyle = weaponColor;
  ctx.lineWidth = 4;
  ctx.beginPath();
  const cx = player.x * TILE + 16, cy = player.y * TILE + 16;
  ctx.arc(cx, cy, 20, 0, Math.PI * 2);
  ctx.stroke();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.stroke();
}

    ctx.strokeRect(canvas.width / 2 - msgW / 2, canvas.height - 50, msgW, 24);

    ctx.textAlign = 'center';

function drawDialogue() {
  if (!dialogueState) return;
  const npc = dialogueState.npc;
  const boxH = 80, boxY = canvas.height - boxH - 8;
  ctx.fillStyle = 'rgba(20,20,40,0.92)';
  ctx.fillRect(8, boxY, canvas.width - 16, boxH);
  ctx.strokeStyle = C.uiBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(8, boxY, canvas.width - 16, boxH);
  ctx.fillStyle = C.uiBorder;
  ctx.font = 'bold 12px monospace';
  ctx.fillText(npc.name, 18, boxY + 18);
  ctx.fillStyle = C.white;
  ctx.font = '11px monospace';
  const lines = wrapText(npc.dialogue[dialogueState.line], canvas.width - 40);
  lines.forEach((l, i) => ctx.fillText(l, 18, boxY + 36 + i * 14));
  ctx.fillStyle = '#888';
  ctx.fillText('[Space/Enter: Continue]', 18, boxY + boxH - 8);
}

function wrapText(text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  ctx.font = '11px monospace';
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxWidth) {
      lines.push(line.trim());
      line = word + ' ';
    } else {
      line = test;
    }
  }
  if (line) lines.push(line.trim());
  return lines;
}

function drawInventory() {
  if (!inventoryOpen) return;
  const boxW = 280, boxH = 300;
  const boxX = (canvas.width - boxW) / 2, boxY = (canvas.height - boxH) / 2;
  ctx.fillStyle = 'rgba(20,20,35,0.95)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = C.uiBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(boxX, boxY, boxW, boxH);
  ctx.fillStyle = C.uiBorder;
  ctx.font = 'bold 14px monospace';
  ctx.fillText('INVENTORY', boxX + 10, boxY + 20);
  ctx.font = '10px monospace';
  const slots = [...player.inventory];
  if (player.equippedWeapon) slots.unshift(player.equippedWeapon);
  slots.forEach((itemId, i) => {
    const item = ITEMS[itemId];
    const isSelected = i === inventoryIndex;
    const isEquipped = i === 0;
    const sx = boxX + 10, sy = boxY + 35 + i * 30;
    if (isSelected) {
      ctx.fillStyle = 'rgba(100,90,60,0.5)';
      ctx.fillRect(sx - 4, sy - 4, boxW - 28, 28);
    }
    drawItemIcon(sx, sy, itemId, 20);
    ctx.fillStyle = isEquipped ? '#7eda8e' : C.white;
    ctx.fillText(`${isEquipped ? '[E] ' : ''}${item.name}`, sx + 26, sy + 14);
    const qty = player.inventory.filter(x => x === itemId).length;
    if (qty > 1 || !isEquipped) {
      ctx.fillStyle = '#888';
      ctx.fillText(`x${isEquipped ? 1 : qty}`, sx + 26, sy + 26);
    }
  });
  ctx.fillStyle = 'rgba(20,20,35,0.95)';
  ctx.fillRect(boxX, boxY + boxH - 50, boxW, 50);
  ctx.strokeStyle = C.uiBorder;
  ctx.strokeRect(boxX, boxY + boxH - 50, boxW, 50);
  if (slots[inventoryIndex]) {
    const item = ITEMS[slots[inventoryIndex]];
    ctx.fillStyle = C.white;
    ctx.font = '10px monospace';
    ctx.fillText(item.desc, boxX + 10, boxY + boxH - 30);
    ctx.fillStyle = '#888';
    ctx.fillText('[Space] Use/Equip | [I/Esc] Close', boxX + 10, boxY + boxH - 12);
  }
}

function drawTrade() {
  if (!tradeOpen) return;
  const boxW = 340, boxH = 280;
  const boxX = (canvas.width - boxW) / 2, boxY = (canvas.height - boxH) / 2;
  const trader = tradeOpen;
  ctx.fillStyle = 'rgba(20,20,35,0.95)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = C.uiBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(boxX, boxY, boxW, boxH);
  ctx.fillStyle = C.uiBorder;
  ctx.font = 'bold 14px monospace';
  ctx.fillText(`Trade with ${trader.name}`, boxX + 10, boxY + 20);
  trader.trades.forEach((t, i) => {
    const hasGive = player.inventory.filter(x => x === t.give).length >= t.giveQty;
    const sy = boxY + 45 + i * 55;
    if (i === tradeIndex) {
      ctx.fillStyle = 'rgba(100,90,60,0.5)';
      ctx.fillRect(boxX + 5, sy - 4, boxW - 10, 50);
    }
    drawItemIcon(boxX + 15, sy, t.give, 20);
    ctx.fillStyle = '#888';
    ctx.fillText(`x${t.giveQty}`, boxX + 42, sy + 14);
    ctx.fillStyle = '#666';
    ctx.fillText('=>', boxX + 60, sy + 14);
    drawItemIcon(boxX + 90, sy, t.receive, 20);
    ctx.fillStyle = '#888';
    ctx.fillText(`x${t.receiveQty}`, boxX + 117, sy + 14);
    ctx.fillStyle = hasGive ? '#7eda8e' : '#da7e7e';
    ctx.fillText(hasGive ? 'Can trade' : 'Need more', boxX + 145, sy + 14);
  });
  ctx.fillStyle = 'rgba(20,20,35,0.95)';
  ctx.fillRect(boxX, boxY + boxH - 40, boxW, 40);
  ctx.strokeStyle = C.uiBorder;
  ctx.strokeRect(boxX, boxY + boxH - 40, boxW, 40);
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('[W/S] Navigate | [Space] Trade | [Esc] Close', boxX + 10, boxY + boxH - 15);
}

function handleInteract() {
  if (dialogueState) {
    dialogueState.line++;
    if (dialogueState.line >= dialogueState.npc.dialogue.length) {
      if (dialogueState.npc.quest && !hasFlag(dialogueState.npc.quest.flag)) {
        setFlag(dialogueState.npc.quest.flag);
        showMessage(dialogueState.npc.quest.msg);
      }
      if (dialogueState.npc.trader) {
        tradeOpen = dialogueState.npc;
        tradeIndex = 0;
      }
      dialogueState = null;
    }
    return;
  }
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  const [dx, dy] = dirs[player.dir];
  const fx = player.x + dx, fy = player.y + dy;
  const map = currentMap();
  for (const p of (DOOR_PORTALS[currentMapId] || [])) {
    if (p.x === fx && p.y === fy) {
      if (p.locked && !hasFlag(p.unlockFlag)) {
        showMessage(p.lockedMsg || "It's locked.");
      } else {
        startTransition({ map: p.map, spawnX: p.spawnX, spawnY: p.spawnY });
      }
      return;
    }
  }
  for (const npc of map.npcs || []) {
    if (npc.x === fx && npc.y === fy) {
      dialogueState = { npc, line: 0 };
      return;
    }
  }
  if (items.length > 0) {
    for (const it of items) {
      if (it.x === player.x && it.y === player.y) {
        tryPickupItem();
        return;
      }
    }
  }
}

function tryUseItem() {
  if (inventoryIndex === 0 && player.equippedWeapon) {
    player.equippedWeapon = null;
    showMessage('Weapon unequipped.');
    return;
  }
  const slots = [...player.inventory];
  if (slots[inventoryIndex] === undefined) return;
  const itemId = slots[inventoryIndex];
  const item = ITEMS[itemId];
  if (item.weapon) {
    player.equippedWeapon = itemId;
    player.inventory.splice(inventoryIndex - (player.equippedWeapon ? 0 : 0), 1);
    if (inventoryIndex > 0) inventoryIndex--;
    showMessage(`Equipped ${item.name}!`);
    return;
  }
  if (itemId === 'potion' || itemId === 'herb') {
    const heal = itemId === 'potion' ? 10 : 5;
    player.hp = Math.min(player.maxHp, player.hp + heal);
    player.inventory.splice(inventoryIndex - (player.equippedWeapon ? 1 : 0), 1);
    if (inventoryIndex > 0) inventoryIndex--;
    showMessage(`Restored ${heal} HP!`);
  }
}

function tryTrade() {
  const trade = tradeOpen.trades[tradeIndex];
  const qty = player.inventory.filter(x => x === trade.give).length;
  if (qty >= trade.giveQty) {
    for (let i = 0; i < trade.giveQty; i++) {
      const idx = player.inventory.indexOf(trade.give);
      player.inventory.splice(idx, 1);
    }
    player.inventory.push(trade.receive);
    showMessage(`Traded for ${ITEMS[trade.receive].name}!`);
  } else {
    showMessage('Not enough items to trade.');
  }
}

window.addEventListener('keydown', e => {
  const c = e.code;
  if (!keys[c]) { keys[c] = true; keyOrder.push(c); }
  if (dialogueState) {
    if (c === 'Space' || c === 'Enter' || c === 'KeyE') handleInteract();
    return;
  }
  if (tradeOpen) {
    if (c === 'KeyW' || c === 'ArrowUp') tradeIndex = (tradeIndex - 1 + tradeOpen.trades.length) % tradeOpen.trades.length;
    if (c === 'KeyS' || c === 'ArrowDown') tradeIndex = (tradeIndex + 1) % tradeOpen.trades.length;
    if (c === 'Space' || c === 'Enter') tryTrade();
    if (c === 'Escape') tradeOpen = null;
    return;
  }
  if (inventoryOpen) {
    if (c === 'KeyW' || c === 'ArrowUp') {
      const max = player.inventory.length + (player.equippedWeapon ? 1 : 0);
      inventoryIndex = (inventoryIndex - 1 + max) % max;
    }
    if (c === 'KeyS' || c === 'ArrowDown') {
      const max = player.inventory.length + (player.equippedWeapon ? 1 : 0);
      inventoryIndex = (inventoryIndex + 1) % max;
    }
    if (c === 'Space' || c === 'Enter') tryUseItem();
    if (c === 'KeyI' || c === 'Tab' || c === 'Escape') inventoryOpen = false;
    return;
  }
  if (c === 'KeyI' || c === 'Tab') { inventoryOpen = true; inventoryIndex = 0; return; }
  if (c === 'Escape') return;
  if (c === 'KeyE' || c === 'KeyX') { startDash(); return; }
  if (c === 'KeyF') { shootGun(); return; }
  if (c === 'Space' || c === 'Enter') { handleInteract(); return; }
});

window.addEventListener('keyup', e => {
  const c = e.code;
  keys[c] = false;
  keyOrder = keyOrder.filter(k => k !== c);
});

function update(dt) {
  if (transitioning) { updateTransition(dt); return; }
  if (messageTimer > 0) messageTimer -= dt;
  player.animTimer += dt;
  if (player.animTimer > 0.15) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }
  if (player.attackCooldown > 0) player.attackCooldown -= dt;
  if (player.hurtTimer > 0) player.hurtTimer -= dt;
  if (player.iFrames > 0) player.iFrames -= dt;
  if (player.gunCooldown > 0) player.gunCooldown -= dt;
  updateDash(dt);
  updateParticles(dt);
  updateProjectiles(dt);
  updateEnemies(dt);
  if (dialogueState || inventoryOpen || tradeOpen) return;
  if (player.dashing) return;
  if (player.moving) {
    const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? player.runSpeed : player.speed;
    player.moveT += dt * spd;
    if (player.moveT >= 1) {
      player.moving = false;
      player.moveT = 0;
      tryPickupItem();
      checkScreenTransition();
      checkDoorPortalAuto();
    }
    return;
  }
  let dx = 0, dy = 0;
  for (let i = keyOrder.length - 1; i >= 0; i--) {
    const k = keyOrder[i];
    if (k === 'ArrowUp' || k === 'KeyW') { dy = -1; player.dir = 3; break; }
    if (k === 'ArrowDown' || k === 'KeyS') { dy = 1; player.dir = 0; break; }
    if (k === 'ArrowLeft' || k === 'KeyA') { dx = -1; player.dir = 1; break; }
    if (k === 'ArrowRight' || k === 'KeyD') { dx = 1; player.dir = 2; break; }
  }
  if (dx !== 0 || dy !== 0) tryMove(dx, dy);
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      drawTile(x, y);
    }
  }
  drawGroundItems();
  const entities = [];
  const map = currentMap();
  for (const npc of map.npcs || []) entities.push({ type: 'npc', obj: npc, y: npc.y });
  for (const e of enemies) { if (e.alive) entities.push({ type: 'enemy', obj: e, y: e.y }); }
  entities.push({ type: 'player', y: player.y });
  entities.sort((a, b) => a.y - b.y);
  for (const e of entities) {
    if (e.type === 'npc') drawNPC(e.obj);
    else if (e.type === 'enemy') drawEnemy(e.obj);
    else {
      const px = lerp(player.fromX, player.x, player.moveT || 1) * TILE;
      const py = lerp(player.fromY, player.y, player.moveT || 1) * TILE;
      const hurtFlash = player.hurtTimer > 0 && Math.floor(player.hurtTimer * 20) % 2 === 0;
      const playerColor = hurtFlash ? '#ff6666' : player.playerColor || C.player;
      ctx.globalAlpha = player.iFrames > 0 ? 0.5 : 1;
      drawCharacter(lerp(player.fromX, player.x, player.moveT || 1), lerp(player.fromY, player.y, player.moveT || 1), playerColor, player.dir, player.animFrame);
      ctx.globalAlpha = 1;
    }
  }
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (map.tiles[y][x] === 4) drawTree(x, y);
    }
  }
  drawAfterimages();
  drawDashSlash();
  drawProjectiles();
  drawParticles();
  drawDamageFloats();
  drawHUD();
  drawDialogue();
  drawInventory();
  drawTrade();
  drawTransition();
}

let lastTime = 0;
function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

initMap();
