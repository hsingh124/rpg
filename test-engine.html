  drawTile(ctx, type, x, y, px, py, TILE, C) {
    const t = Date.now();
    if (type === 0) {
      ctx.fillStyle = (x+y)%2 ? C.grass : C.grass2;
      ctx.fillRect(px, py, TILE, TILE);
      // Occasional grass tufts
      if ((x*7+y*13)%11 < 3) {
        ctx.fillStyle = C.moss;
        ctx.fillRect(px+8, py+20, 2, 6);
        ctx.fillRect(px+12, py+18, 2, 8);
        ctx.fillRect(px+16, py+21, 2, 5);
      }
    }
    else if (type === 1) {
      ctx.fillStyle = C.wall; ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(px, py+TILE-4, TILE, 4);
      // Stone lines
      ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
      ctx.strokeRect(px+2, py+2, TILE-4, TILE/2-2);
    }
    else if (type === 2) {
      ctx.fillStyle = C.water; ctx.fillRect(px, py, TILE, TILE);
      const shimmer = Math.sin(t/600 + x*2 + y*3) * 0.15;
      ctx.fillStyle = `rgba(255,255,255,${0.1 + shimmer})`;
      ctx.fillRect(px+4, py+8+Math.sin(t/800+x)*4, 12, 3);
    }
    else if (type === 3) {
      ctx.fillStyle = C.path; ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = C.mud;
      if ((x+y*3)%5 === 0) ctx.fillRect(px+6, py+10, 4, 3);
      if ((x*2+y)%7 === 0) ctx.fillRect(px+16, py+20, 5, 3);
    }
    else if (type === 4) {
      ctx.fillStyle = (x+y)%2 ? C.grass : C.grass2; ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = C.trunk; ctx.fillRect(px+13, py+18, 6, 14);
      ctx.fillStyle = C.tree;
      ctx.beginPath(); ctx.arc(px+16, py+12, 14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(0,40,0,0.3)';
      ctx.beginPath(); ctx.arc(px+14, py+10, 8, 0, Math.PI*2); ctx.fill();
    }
    else if (type === 5) {
      ctx.fillStyle = C.path; ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = C.door; ctx.fillRect(px+4, py+2, 24, 28);
      ctx.fillStyle = '#c4a55a'; ctx.fillRect(px+20, py+14, 4, 4);
    }
    else if (type === 6) {
      ctx.fillStyle = C.roof; ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      for (let i = 0; i < TILE; i += 8) ctx.fillRect(px, py+i, TILE, 1);
    }
    else if (type === 10) {
      // Cave/crypt floor
      ctx.fillStyle = (x+y)%2 ? '#3a3530' : '#342f2a';
      ctx.fillRect(px, py, TILE, TILE);
      if ((x*3+y*7)%9 < 2) {
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.fillRect(px+4, py+4, 8, 6);
      }
    }
    else if (type === 11) {
      // Cave wall
      ctx.fillStyle = '#2a2520'; ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(px, py+TILE-6, TILE, 6);
      ctx.fillStyle = 'rgba(100,80,60,0.15)';
      ctx.fillRect(px+3, py+5, 10, 6);
    }
    else {
      ctx.fillStyle = '#333'; ctx.fillRect(px, py, TILE, TILE);
    }
  },

  drawEnemy(ctx, type, enemy, px, py, TILE, C, hurt) {
    const t = Date.now();
    if (type === 'frog') {
      const hop = Math.abs(Math.sin(t/400)) * 3;
      ctx.fillStyle = hurt ? '#fff' : '#4a8a3a';
      ctx.beginPath(); ctx.ellipse(px+16, py+22-hop, 11, 8, 0, 0, Math.PI*2); ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(px+11, py+16-hop, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+21, py+16-hop, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(px+12, py+16-hop, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+20, py+16-hop, 2, 0, Math.PI*2); ctx.fill();
    }
    else if (type === 'snake') {
      const wave = Math.sin(t/300) * 3;
      ctx.fillStyle = hurt ? '#fff' : '#7a6a4a';
      ctx.beginPath();
      ctx.moveTo(px+6, py+22);
      ctx.quadraticCurveTo(px+12, py+16+wave, px+16, py+20);
      ctx.quadraticCurveTo(px+22, py+24-wave, px+28, py+18);
      ctx.lineWidth = 5; ctx.strokeStyle = hurt ? '#fff' : '#7a6a4a'; ctx.stroke();
      // Head
      ctx.beginPath(); ctx.arc(px+28, py+18, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#c00'; ctx.fillRect(px+30, py+17, 4, 2);
      // Eyes
      ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(px+29, py+16, 2, 0, Math.PI*2); ctx.fill();
    }
    else if (type === 'ghost') {
      const float = Math.sin(t/500) * 4;
      const alpha = 0.6 + Math.sin(t/700) * 0.2;
      ctx.globalAlpha = hurt ? 1 : alpha;
      ctx.fillStyle = hurt ? '#fff' : '#8a7acc';
      ctx.beginPath();
      ctx.moveTo(px+6, py+28);
      ctx.lineTo(px+6, py+12+float);
      ctx.quadraticCurveTo(px+16, py+2+float, px+26, py+12+float);
      ctx.lineTo(px+26, py+28);
      // Wavy bottom
      ctx.quadraticCurveTo(px+22, py+24, px+20, py+28);
      ctx.quadraticCurveTo(px+16, py+24, px+12, py+28);
      ctx.quadraticCurveTo(px+8, py+24, px+6, py+28);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(px+12, py+14+float, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+20, py+14+float, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(px+12, py+15+float, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+20, py+15+float, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  },
