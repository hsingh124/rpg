<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Game Editor</title>
<style>
:root {
  --bg: #12121a; --panel: #1a1a2e; --panel2: #16213e;
  --border: #2a3a5e; --accent: #e8c170; --accent2: #f0d890;
  --text: #d0d0d8; --text2: #8a8a9a; --input: #0d1b2a;
  --red: #e74c3c; --green: #27ae60; --blue: #3498db;
  --topbar-h: 44px; --status-h: 26px; --left-w: 200px; --right-w: 310px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font: 13px/1.4 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
input, select, textarea, button { font: inherit; color: var(--text); }
input, select, textarea { background: var(--input); border: 1px solid var(--border); border-radius: 3px; padding: 4px 6px; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
textarea { resize: vertical; }
button { background: var(--panel2); border: 1px solid var(--border); border-radius: 3px; padding: 4px 10px; cursor: pointer; }
button:hover { background: var(--border); }
button.primary { background: #0f3460; border-color: var(--accent); color: var(--accent); }
button.primary:hover { background: #1a4a80; }
button.danger { color: var(--red); border-color: var(--red); }
button.danger:hover { background: rgba(231,76,60,.15); }
button.success { color: var(--green); border-color: var(--green); }
button.success:hover { background: rgba(39,174,96,.15); }
label { display: block; color: var(--text2); font-size: 11px; margin-bottom: 2px; margin-top: 8px; text-transform: uppercase; letter-spacing: .5px; }
label:first-child { margin-top: 0; }
.row { display: flex; gap: 6px; align-items: center; }
.row > * { flex: 1; }
h3 { font-size: 13px; color: var(--accent); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
h4 { font-size: 12px; color: var(--text2); margin: 10px 0 4px; }

/* Layout */
#topbar {
  height: var(--topbar-h); background: var(--panel); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 8px;
}
#topbar .logo { color: var(--accent); font-weight: 700; font-size: 14px; margin-right: 8px; white-space: nowrap; }
#topbar .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
#projectTitle { width: 140px; font-weight: 600; }
#mapSelect { width: 120px; }
#topbar .spacer { flex: 1; }
.toolbar-group { display: flex; gap: 4px; }
.tool-btn { padding: 4px 8px; font-size: 12px; border-radius: 3px; }
.tool-btn.active { background: var(--accent); color: #111; border-color: var(--accent); }

#workspace { display: flex; height: calc(100vh - var(--topbar-h)); }

#leftPanel {
  width: var(--left-w); background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#leftPanel .section-title {
  font-size: 11px; color: var(--accent); padding: 8px 10px 4px; text-transform: uppercase; letter-spacing: .5px;
}
#tilePalette { display: grid; grid-template-columns: repeat(5,1fr); gap: 3px; padding: 6px 10px; }
.tile-swatch {
  width: 100%; aspect-ratio: 1; border: 2px solid transparent; border-radius: 3px; cursor: pointer;
  position: relative; display: flex; align-items: center; justify-content: center;
}
.tile-swatch:hover { border-color: var(--text2); }
.tile-swatch.active { border-color: var(--accent); box-shadow: 0 0 6px rgba(232,193,112,.4); }
.tile-swatch canvas { width: 100%; height: 100%; border-radius: 2px; image-rendering: pixelated; }
.tile-swatch .tile-id { position: absolute; bottom: 1px; right: 2px; font-size: 8px; color: rgba(255,255,255,.6); }

#leftPanel .entity-buttons { padding: 6px 10px; display: flex; flex-direction: column; gap: 4px; }
#leftPanel .entity-buttons button { text-align: left; padding: 6px 10px; font-size: 12px; }
#leftPanel .entity-buttons button.active { background: var(--accent); color: #111; border-color: var(--accent); }

.entity-list { padding: 4px 10px; overflow-y: auto; flex: 1; }
.entity-item {
  padding: 4px 8px; margin-bottom: 2px; border-radius: 3px; cursor: pointer; font-size: 12px;
  display: flex; align-items: center; gap: 6px; border: 1px solid transparent;
}
.entity-item:hover { background: rgba(255,255,255,.05); }
.entity-item.selected { border-color: var(--accent); background: rgba(232,193,112,.1); }
.entity-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

#canvasWrap {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg); overflow: auto; position: relative;
}
#mapCanvas { image-rendering: pixelated; cursor: crosshair; border: 2px solid var(--border); }
#statusBar {
  position: absolute; bottom: 0; left: 0; right: 0; height: var(--status-h);
  background: var(--panel); border-top: 1px solid var(--border);
  padding: 0 12px; font-size: 11px; color: var(--text2);
  display: flex; align-items: center; gap: 16px;
}

#rightPanel {
  width: var(--right-w); background: var(--panel); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 12px;
}
.prop-group { margin-bottom: 12px; }
.prop-group .inline-btns { display: flex; gap: 4px; margin-top: 6px; }

/* Exit config */
.exit-row { display: flex; align-items: center; gap: 4px; padding: 3px 0; font-size: 12px; }
.exit-row select, .exit-row input { font-size: 11px; padding: 2px 4px; }
.exit-row input[type="number"] { width: 40px; }
.exit-row input[type="text"] { width: 60px; }
.exit-dir { width: 40px; font-weight: 600; color: var(--accent); }

/* Trade row */
.trade-row { display: flex; align-items: center; gap: 4px; padding: 3px 0; font-size: 11px; flex-wrap: wrap; }
.trade-row select { width: 80px; }
.trade-row input[type="number"] { width: 36px; }

/* Modal */
#modalOverlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 100; justify-content: center; align-items: center;
}
#modalOverlay.visible { display: flex; }
#modal {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  width: 640px; max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
#modal.wide { width: 840px; }
#modalHeader {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
}
#modalHeader h3 { border: none; margin: 0; padding: 0; }
#modalBody { padding: 16px; overflow-y: auto; flex: 1; }
#modalBody .form-row { display: flex; gap: 12px; margin-bottom: 6px; }
#modalBody .form-row > div { flex: 1; }
#modalBody table { width: 100%; border-collapse: collapse; font-size: 12px; }
#modalBody th { text-align: left; color: var(--text2); font-size: 11px; padding: 4px 6px; border-bottom: 1px solid var(--border); }
#modalBody td { padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,.05); }
#modalBody td input, #modalBody td select { width: 100%; font-size: 11px; padding: 2px 4px; }
#modalBody td input[type="number"] { width: 60px; }
#modalBody td input[type="color"] { width: 40px; height: 24px; padding: 0; border: none; }
#modalFooter { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 6px; }

/* Export area */
#exportArea { width: 100%; height: 400px; font-family: 'Courier New', monospace; font-size: 11px; background: #0a0a14; color: #8f8; }

/* NPC color swatch next to input */
.color-row { display: flex; gap: 6px; align-items: center; }
.color-row input[type="color"] { width: 32px; height: 28px; padding: 0; border: 1px solid var(--border); border-radius: 3px; }
.color-row input[type="text"] { flex: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<div id="topbar">
  <span class="logo">⚔ RPG Editor</span>
  <div class="sep"></div>
  <input id="projectTitle" value="My RPG Game" placeholder="Game Title">
  <div class="sep"></div>
  <select id="mapSelect"></select>
  <button id="btnAddMap" class="success" title="Add new map">+ Map</button>
  <button id="btnDelMap" class="danger" title="Delete current map">×</button>
  <div class="sep"></div>
  <div class="toolbar-group">
    <button class="tool-btn active" data-tool="paint" title="Paint tiles (P)">🖌 Paint</button>
    <button class="tool-btn" data-tool="fill" title="Flood fill (F)">🪣 Fill</button>
    <button class="tool-btn" data-tool="erase" title="Erase to grass (E)">⌫ Erase</button>
    <button class="tool-btn" data-tool="select" title="Select entities (S)">⬚ Select</button>
  </div>
  <div class="spacer"></div>
  <button id="btnPlayer" class="primary">Player</button>
  <button id="btnItemDefs" class="primary">Items</button>
  <button id="btnEnemyDefs" class="primary">Enemies</button>
  <button id="btnColors" class="primary">Colors</button>
  <button id="btnWinCond" class="primary">Win</button>
  <div class="sep"></div>
  <button id="btnSave">Save</button>
  <button id="btnLoad">Load</button>
  <button id="btnExport" class="primary">Export</button>
  <button id="btnPlay" class="success" style="font-weight:700">▶ Play</button>
</div>

<!-- ═══ WORKSPACE ═══ -->
<div id="workspace">

  <!-- Left Panel -->
  <div id="leftPanel">
    <div class="section-title">Tiles</div>
    <div id="tilePalette"></div>
    <div class="section-title" style="margin-top:6px">Place Entities</div>
    <div class="entity-buttons">
      <button data-place="npc">👤 Place NPC</button>
      <button data-place="enemy">💀 Place Enemy</button>
      <button data-place="item">✦ Place Item</button>
      <button data-place="door">🚪 Place Door Portal</button>
    </div>
    <div class="section-title" style="margin-top:6px">On This Map</div>
    <div class="entity-list" id="entityList"></div>
  </div>

  <!-- Canvas Area -->
  <div id="canvasWrap">
    <canvas id="mapCanvas" width="640" height="480"></canvas>
    <div id="statusBar">
      <span id="statusTool">Tool: Paint</span>
      <span id="statusPos">Pos: -</span>
      <span id="statusTile">Tile: -</span>
      <span id="statusMap">Map: -</span>
    </div>
  </div>

  <!-- Right Panel -->
  <div id="rightPanel">
    <div id="propsContent"></div>
  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="modalOverlay">
  <div id="modal">
    <div id="modalHeader"><h3 id="modalTitle">Modal</h3><button id="modalClose">✕</button></div>
    <div id="modalBody"></div>
    <div id="modalFooter"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════════════════
const TILE = 32, COLS = 20, ROWS = 15;

const TILE_INFO = [
  { id:0,  name:'Grass',        color:'#4a7a3b', color2:'#3d6b31', solid:false },
  { id:1,  name:'Stone Wall',   color:'#7a6652', solid:true },
  { id:2,  name:'Water',        color:'#3b6d9e', solid:true },
  { id:3,  name:'Dirt Path',    color:'#c4a55a', solid:false },
  { id:4,  name:'Tree',         color:'#2d5a1e', solid:true, tree:true },
  { id:5,  name:'Door',         color:'#5a3a1a', solid:false },
  { id:6,  name:'Roof',         color:'#8b3a3a', solid:true },
  { id:7,  name:'Sand',         color:'#d4b96a', solid:false },
  { id:8,  name:'Dungeon Floor',color:'#4a4540', solid:false },
  { id:9,  name:'Lava',         color:'#cc4400', solid:true },
  { id:10, name:'Cave Floor',   color:'#3a3530', solid:false },
  { id:11, name:'Cave Wall',    color:'#2a2520', solid:true },
  { id:12, name:'Stalagmite',   color:'#4a3530', solid:true },
  { id:13, name:'Dungeon Wall', color:'#3a3545', solid:true },
  { id:14, name:'Bones',        color:'#4a4540', solid:false },
  { id:15, name:'Snow',         color:'#e8e8f0', solid:false },
  { id:16, name:'Ice',          color:'#a0c8e8', solid:false },
  { id:17, name:'Pine Tree',    color:'#1a5028', solid:true, tree:true },
  { id:18, name:'Flowers',      color:'#5a8a4b', solid:false },
  { id:19, name:'Bridge',       color:'#8b6914', solid:false },
  { id:20, name:'Dark Grass',   color:'#2a5a22', solid:false },
  { id:21, name:'Cobblestone',  color:'#8a8078', solid:false },
  { id:22, name:'Carpet',       color:'#8b3050', solid:false },
  { id:23, name:'Bookshelf',    color:'#6b4226', solid:true },
  { id:24, name:'Fence',        color:'#b89a6a', solid:true },
];

const ENEMY_SPRITES = ['slime','frog','snake','skeleton','ghost','wraith','bat','spider','wolf','goblin','rat'];
const ITEM_ICONS = ['herb','shroom','fossil','gem','crystal','potion','scroll','feather','coin','sword','staff','gun','key','seal','bone'];
const DIR_NAMES = ['Down','Left','Right','Up'];

// ═══════════════════════════════════════════════════════════════════════════════
// PROJECT STATE
// ═══════════════════════════════════════════════════════════════════════════════
function makeEmptyTiles() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function createDefaultProject() {
  return {
    title: 'My RPG Game',
    startMap: 'village',
    player: { name:'Hero', x:9, y:9, hp:20, mp:10, atk:2 },
    combat: { dash:true, gun:false },
    colors: {
      grass:'#4a7a3b', grass2:'#3d6b31', path:'#c4a55a', water:'#3b6d9e',
      wall:'#7a6652', roof:'#8b3a3a', door:'#5a3a1a', tree:'#2d5a1e', trunk:'#6b4226',
      sand:'#d4b96a', sand2:'#c8a85a', lava:'#cc4400',
      snow:'#e8e8f0', snow2:'#d8d8e8', ice:'#a0c8e8', pine:'#1a5028',
      caveFloor:'#3a3530', caveFloor2:'#342f2a', caveWall:'#2a2520',
      dungeonFloor:'#4a4540', dungeonFloor2:'#3e3a35', dungeonWall:'#3a3545',
      darkGrass:'#2a5a22', darkGrass2:'#224a1a',
      cobble:'#8a8078', carpet:'#8b3050', carpetBorder:'#c4a55a',
      wood:'#6b4226', fence:'#b89a6a', bridge:'#8b6914',
      player:'#e8c170', shadow:'rgba(0,0,0,0.2)', uiBorder:'#e8c170',
      hpFill:'#e74c3c', hpBg:'#555', mpFill:'#3498db', xpFill:'#f1c40f', white:'#fff',
    },
    winCondition: { type:'item', item:'', flag:'', title:'Victory!', message:'You won the game!' },
    items: {
      herb: { name:'Herb', color:'#5cb85c', icon:'herb', desc:'Heals 5 HP.', heal:5 },
    },
    enemyTypes: {
      slime: { name:'Slime', color:'#5cb85c', hp:8, atk:2, xp:10, speed:0.8, drops:['herb'] },
    },
    maps: {
      village: {
        name: 'Village',
        tiles: makeEmptyTiles(),
        npcs: [],
        enemies: [],
        items: [],
        exits: {},
        exitTiles: {},
      },
    },
    doorPortals: {},
  };
}

let project = createDefaultProject();

// ═══════════════════════════════════════════════════════════════════════════════
// EDITOR STATE
// ═══════════════════════════════════════════════════════════════════════════════
let ed = {
  currentMap: 'village',
  tool: 'paint',        // paint, fill, erase, select, place_npc, place_enemy, place_item, place_door
  selectedTile: 0,
  hoverX: -1, hoverY: -1,
  isPainting: false,
  selType: null,         // 'npc','enemy','item','doorPortal'
  selIndex: -1,
  undoStack: [],
  undoPointer: -1,
};

function curMap() { return project.maps[ed.currentMap]; }

// ═══════════════════════════════════════════════════════════════════════════════
// UNDO
// ═══════════════════════════════════════════════════════════════════════════════
function pushUndo() {
  const snap = JSON.stringify(curMap().tiles);
  ed.undoStack = ed.undoStack.slice(0, ed.undoPointer + 1);
  ed.undoStack.push(snap);
  if (ed.undoStack.length > 50) ed.undoStack.shift();
  ed.undoPointer = ed.undoStack.length - 1;
}
function undo() {
  if (ed.undoPointer > 0) {
    ed.undoPointer--;
    curMap().tiles = JSON.parse(ed.undoStack[ed.undoPointer]);
    render();
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// CANVAS RENDERING
// ═══════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawTiles();
  drawEntities();
  drawGrid();
  drawHover();
  updateEntityList();
  updateStatusBar();
}

function drawTiles() {
  const tiles = curMap().tiles;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const type = tiles[y][x];
      const px = x * TILE, py = y * TILE;
      drawSingleTile(ctx, type, x, y, px, py);
    }
  }
}

function drawEntities() {
  const map = curMap();

  // Exit tile indicators
  for (const dir of ['north','south','east','west']) {
    const exitTiles = map.exitTiles[dir] || [];
    if (!exitTiles.length) continue;
    ctx.fillStyle = 'rgba(39,174,96,.35)';
    for (const idx of exitTiles) {
      if (dir === 'north') ctx.fillRect(idx*TILE, 0, TILE, TILE);
      else if (dir === 'south') ctx.fillRect(idx*TILE, (ROWS-1)*TILE, TILE, TILE);
      else if (dir === 'west') ctx.fillRect(0, idx*TILE, TILE, TILE);
      else if (dir === 'east') ctx.fillRect((COLS-1)*TILE, idx*TILE, TILE, TILE);
    }
  }

  // Door portal indicators
  const portals = project.doorPortals[ed.currentMap] || [];
  portals.forEach((p, i) => {
    const px = p.x * TILE, py = p.y * TILE;
    ctx.strokeStyle = '#e8c170';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(px+2, py+2, TILE-4, TILE-4);
    ctx.setLineDash([]);
    if (ed.selType === 'doorPortal' && ed.selIndex === i) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.strokeRect(px, py, TILE, TILE);
    }
  });

  // Items on map
  map.items.forEach((it, i) => {
    const px = it.x * TILE, py = it.y * TILE;
    const def = project.items[it.item];
    const col = def ? def.color : '#aaa';
    // glow
    ctx.shadowColor = col; ctx.shadowBlur = 8;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(px+16, py+16, 7, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // icon letter
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText((it.item || '?').slice(0,3).toUpperCase(), px+16, py+17);
    // selection border
    if (ed.selType === 'item' && ed.selIndex === i) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.strokeRect(px+2, py+2, TILE-4, TILE-4);
    }
  });

  // Enemies
  map.enemies.forEach((en, i) => {
    const px = en.x * TILE, py = en.y * TILE;
    const def = project.enemyTypes[en.type];
    const col = def ? def.color : '#e55';
    // diamond shape
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(px+16, py+4); ctx.lineTo(px+28, py+16);
    ctx.lineTo(px+16, py+28); ctx.lineTo(px+4, py+16);
    ctx.closePath(); ctx.fill();
    // border
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px+16, py+4); ctx.lineTo(px+28, py+16);
    ctx.lineTo(px+16, py+28); ctx.lineTo(px+4, py+16);
    ctx.closePath(); ctx.stroke();
    // label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(en.type.slice(0,4).toUpperCase(), px+16, py+17);
    // selection
    if (ed.selType === 'enemy' && ed.selIndex === i) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.strokeRect(px+1, py+1, TILE-2, TILE-2);
    }
  });

  // NPCs
  map.npcs.forEach((npc, i) => {
    const px = npc.x * TILE + 2, py = npc.y * TILE + 2;
    const w = TILE - 4, h = TILE - 4;
    ctx.fillStyle = npc.color || '#7eb8da';
    ctx.beginPath();
    ctx.roundRect(px, py, w, h, 4);
    ctx.fill();
    // border
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(px, py, w, h, 4); ctx.stroke();
    // name initial
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(npc.name ? npc.name[0].toUpperCase() : '?', px + w/2, py + h/2);
    // direction indicator
    const cx = px + w/2, cy = py + h/2;
    ctx.fillStyle = 'rgba(255,255,255,.8)';
    if (npc.dir === 0) ctx.fillRect(cx-3, py+h-2, 6, 3);       // down
    else if (npc.dir === 1) ctx.fillRect(px-1, cy-3, 3, 6);     // left
    else if (npc.dir === 2) ctx.fillRect(px+w-2, cy-3, 3, 6);   // right
    else if (npc.dir === 3) ctx.fillRect(cx-3, py-1, 6, 3);     // up
    // selection
    if (ed.selType === 'npc' && ed.selIndex === i) {
      ctx.strokeStyle = '#e8c170'; ctx.lineWidth = 2;
      ctx.strokeRect(npc.x*TILE, npc.y*TILE, TILE, TILE);
    }
  });
}

function drawGrassBg(ctx, x, y, px, py) {
  ctx.fillStyle = (x+y)%2 ? '#4a7a3b' : '#3d6b31';
  ctx.fillRect(px, py, TILE, TILE);
}

function drawSingleTile(ctx, type, x, y, px, py) {
  const info = TILE_INFO[type] || TILE_INFO[0];

  // Tiles that need grass underneath (overlay tiles)
  const grassOverlay = new Set([4, 17, 18, 24]);
  if (grassOverlay.has(type)) {
    drawGrassBg(ctx, x, y, px, py);
  } else if (type === 5) {
    // door gets path background
    ctx.fillStyle = '#c4a55a'; ctx.fillRect(px, py, TILE, TILE);
  } else if (type === 19) {
    // bridge gets water background
    ctx.fillStyle = '#3b6d9e'; ctx.fillRect(px, py, TILE, TILE);
  } else if (type === 12) {
    // stalagmite gets cave floor
    ctx.fillStyle = (x+y)%2 ? '#3a3530' : '#342f2a'; ctx.fillRect(px, py, TILE, TILE);
  } else if (type === 14) {
    // bones gets dungeon floor
    ctx.fillStyle = (x+y)%2 ? '#4a4540' : '#3e3a35'; ctx.fillRect(px, py, TILE, TILE);
  } else {
    // Standard base color
    if (info.color2 && (x+y)%2) {
      ctx.fillStyle = info.color2;
    } else {
      ctx.fillStyle = info.color;
    }
    ctx.fillRect(px, py, TILE, TILE);
  }

  switch(type) {
    case 0: // grass tufts
      if ((x*7+y*13)%11 < 3) { ctx.fillStyle = '#3d6b31'; ctx.fillRect(px+8,py+22,2,5); ctx.fillRect(px+14,py+20,2,6); ctx.fillRect(px+20,py+23,2,4); }
      break;
    case 1: // wall bricks
      ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(px, py+TILE-4, TILE, 4);
      ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
      ctx.strokeRect(px+1, py+1, TILE/2-1, TILE/2-1);
      ctx.strokeRect(px+TILE/2, py+TILE/2, TILE/2-1, TILE/2-1);
      break;
    case 2: // water shimmer
      ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(px+4, py+10, 12, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(px+14, py+20, 10, 2);
      break;
    case 3: // path specks
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      if ((x+y*3)%5===0) ctx.fillRect(px+6,py+10,4,3);
      if ((x*2+y)%7===0) ctx.fillRect(px+16,py+20,5,3);
      break;
    case 4: // tree (grass bg already drawn)
      ctx.fillStyle = '#6b4226'; ctx.fillRect(px+13, py+18, 6, 14);
      ctx.fillStyle = '#2d5a1e';
      ctx.beginPath(); ctx.arc(px+16, py+12, 14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(0,50,0,0.25)';
      ctx.beginPath(); ctx.arc(px+13, py+10, 7, 0, Math.PI*2); ctx.fill();
      break;
    case 5: // door (path bg already drawn)
      ctx.fillStyle = '#5a3a1a'; ctx.fillRect(px+4, py+2, 24, 28);
      ctx.fillStyle = '#e8c170'; ctx.fillRect(px+20, py+14, 4, 4);
      ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(px+4, py+2, 24, 3);
      break;
    case 6: // roof lines
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      for (let i = 0; i < TILE; i += 8) ctx.fillRect(px, py+i, TILE, 1);
      ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(px, py+TILE-2, TILE, 2);
      break;
    case 7: // sand
      if ((x*5+y*3)%9<2) { ctx.fillStyle = 'rgba(0,0,0,0.04)'; ctx.beginPath(); ctx.arc(px+10+((x*7)%12), py+12+((y*5)%10), 3, 0, Math.PI*2); ctx.fill(); }
      break;
    case 8: // dungeon floor
      ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1; ctx.strokeRect(px+1, py+1, TILE-2, TILE-2);
      break;
    case 9: // lava glow
      ctx.fillStyle = 'rgba(255,200,0,0.3)'; ctx.fillRect(px+2, py+6, 14, 6);
      ctx.fillStyle = 'rgba(255,100,0,0.2)'; ctx.fillRect(px+12, py+18, 12, 5);
      break;
    case 10: // cave floor
      if ((x*3+y*7)%9<2) { ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(px+4, py+4, 8, 6); }
      break;
    case 11: // cave wall shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(px, py+TILE-6, TILE, 6);
      ctx.fillStyle = 'rgba(100,80,60,0.12)'; ctx.fillRect(px+3, py+5, 10, 6);
      break;
    case 12: // stalagmite spike (cave floor bg already drawn)
      ctx.fillStyle = '#2a2520';
      ctx.beginPath(); ctx.moveTo(px+10, py+TILE); ctx.lineTo(px+16, py+4); ctx.lineTo(px+22, py+TILE); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(px+15, py+8, 2, 12);
      break;
    case 13: // dungeon wall
      ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(px, py+TILE-5, TILE, 5);
      ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
      ctx.strokeRect(px+2, py+2, TILE-4, TILE/2-2);
      break;
    case 14: // bones (dungeon floor bg already drawn)
      ctx.fillStyle = '#c8c0b0';
      ctx.fillRect(px+6, py+14, 14, 3); ctx.fillRect(px+10, py+10, 3, 10);
      ctx.beginPath(); ctx.arc(px+12, py+10, 4, 0, Math.PI*2); ctx.fill();
      break;
    case 15: // snow
      if ((x*3+y*11)%8<2) { ctx.fillStyle = 'rgba(200,210,255,0.3)'; ctx.beginPath(); ctx.arc(px+8+((x*7)%16), py+10+((y*5)%12), 2, 0, Math.PI*2); ctx.fill(); }
      break;
    case 16: // ice
      ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(px+3, py+5, 10, 4);
      ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(px+16, py+18, 8, 3);
      break;
    case 17: // pine tree (grass bg already drawn)
      ctx.fillStyle = '#6b4226'; ctx.fillRect(px+14, py+22, 4, 10);
      ctx.fillStyle = '#1a5028';
      ctx.beginPath(); ctx.moveTo(px+16, py+2); ctx.lineTo(px+26, py+16); ctx.lineTo(px+6, py+16); ctx.fill();
      ctx.beginPath(); ctx.moveTo(px+16, py+8); ctx.lineTo(px+28, py+24); ctx.lineTo(px+4, py+24); ctx.fill();
      break;
    case 18: // flowers (grass bg already drawn)
      const fc = ['#e55','#e8e','#ee5','#5be','#f90'];
      for (let i = 0; i < 4; i++) {
        const fx = px+6+((x*7+i*11)%20), fy = py+6+((y*5+i*13)%20);
        ctx.fillStyle = fc[(x+y+i)%fc.length];
        ctx.beginPath(); ctx.arc(fx, fy, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#2d5a1e'; ctx.fillRect(fx-0.5, fy+3, 1.5, 4);
      }
      break;
    case 19: // bridge (water bg already drawn)
      ctx.fillStyle = '#8b6914'; ctx.fillRect(px, py+2, TILE, TILE-4);
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(px, py+10, TILE, 2); ctx.fillRect(px, py+20, TILE, 2);
      break;
    case 20: // dark grass
      if ((x*9+y*3)%7<2) { ctx.fillStyle = 'rgba(0,40,0,0.2)'; ctx.fillRect(px+6,py+18,3,8); ctx.fillRect(px+18,py+16,3,10); }
      break;
    case 21: // cobblestone
      ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
      ctx.strokeRect(px+1, py+1, 14, 14); ctx.strokeRect(px+16, py+1, 14, 14);
      ctx.strokeRect(px+8, py+16, 14, 14);
      break;
    case 22: // carpet
      ctx.strokeStyle = '#c4a55a'; ctx.lineWidth = 1; ctx.strokeRect(px+2, py+2, TILE-4, TILE-4);
      break;
    case 23: // bookshelf
      const bc = ['#8b3030','#3050a0','#2a7030','#8b6014','#604080'];
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 4; col++) {
          ctx.fillStyle = bc[(x+y+row+col)%bc.length];
          ctx.fillRect(px+2+col*7, py+2+row*10, 6, 8);
        }
      }
      break;
    case 24: // fence (grass bg already drawn)
      ctx.fillStyle = '#b89a6a';
      ctx.fillRect(px, py+10, TILE, 3); ctx.fillRect(px, py+20, TILE, 3);
      ctx.fillRect(px+4, py+6, 3, 20); ctx.fillRect(px+25, py+6, 3, 20);
      break;
  }
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,.06)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*TILE, 0); ctx.lineTo(x*TILE, ROWS*TILE); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*TILE); ctx.lineTo(COLS*TILE, y*TILE); ctx.stroke();
  }
}

function drawHover() {
  if (ed.hoverX < 0 || ed.hoverY < 0) return;
  const px = ed.hoverX * TILE, py = ed.hoverY * TILE;
  if (ed.tool === 'paint' || ed.tool === 'fill') {
    // Preview selected tile with transparency
    ctx.globalAlpha = 0.5;
    drawSingleTile(ctx, ed.selectedTile, ed.hoverX, ed.hoverY, px, py);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#e8c170'; ctx.lineWidth = 2;
    ctx.strokeRect(px, py, TILE, TILE);
  } else if (ed.tool === 'erase') {
    ctx.fillStyle = 'rgba(231,76,60,.3)';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2;
    ctx.strokeRect(px, py, TILE, TILE);
  } else {
    ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 1;
    ctx.strokeRect(px, py, TILE, TILE);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// TILE PALETTE
// ═══════════════════════════════════════════════════════════════════════════════
function buildPalette() {
  const pal = document.getElementById('tilePalette');
  pal.innerHTML = '';
  TILE_INFO.forEach((info, i) => {
    const div = document.createElement('div');
    div.className = 'tile-swatch' + (i === ed.selectedTile ? ' active' : '');
    div.title = `${info.name} (${i})${info.solid ? ' [Solid]' : ''}`;
    div.dataset.tile = i;
    const c = document.createElement('canvas');
    c.width = 32; c.height = 32;
    const tc = c.getContext('2d');
    drawSingleTile(tc, i, 1, 1, 0, 0);
    div.appendChild(c);
    const idSpan = document.createElement('span');
    idSpan.className = 'tile-id';
    idSpan.textContent = i;
    div.appendChild(idSpan);
    div.addEventListener('click', () => {
      ed.selectedTile = i;
      setTool('paint');
      buildPalette();
    });
    pal.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// TOOL MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════════
function setTool(tool, keepSelection) {
  ed.tool = tool;
  if (!keepSelection) { ed.selType = null; ed.selIndex = -1; }
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  document.querySelectorAll('[data-place]').forEach(b => b.classList.remove('active'));
  if (tool.startsWith('place_')) {
    const placeType = tool.replace('place_', '');
    document.querySelectorAll('[data-place]').forEach(b => b.classList.toggle('active', b.dataset.place === placeType));
  }
  canvas.style.cursor = (tool === 'select' || tool.startsWith('place_')) ? 'pointer' : 'crosshair';
  updateProperties();
  render();
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAP MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════════
function updateMapSelect() {
  const sel = document.getElementById('mapSelect');
  sel.innerHTML = '';
  for (const id of Object.keys(project.maps)) {
    const opt = document.createElement('option');
    opt.value = id; opt.textContent = project.maps[id].name || id;
    if (id === ed.currentMap) opt.selected = true;
    sel.appendChild(opt);
  }
}

function switchMap(id) {
  if (!project.maps[id]) return;
  ed.currentMap = id;
  ed.selType = null; ed.selIndex = -1;
  ed.undoStack = []; ed.undoPointer = -1;
  pushUndo();
  updateMapSelect();
  updateProperties();
  render();
}

function addMap() {
  let id = 'map_' + Date.now();
  const name = prompt('Map name:', 'New Map');
  if (!name) return;
  id = name.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_');
  if (project.maps[id]) id += '_' + Date.now();
  project.maps[id] = { name, tiles: makeEmptyTiles(), npcs: [], enemies: [], items: [], exits: {}, exitTiles: {} };
  switchMap(id);
}

function deleteMap() {
  const keys = Object.keys(project.maps);
  if (keys.length <= 1) return alert('Cannot delete the last map.');
  if (!confirm(`Delete map "${curMap().name}"?`)) return;
  const id = ed.currentMap;
  delete project.maps[id];
  delete project.doorPortals[id];
  // Clean references
  for (const m of Object.values(project.maps)) {
    for (const dir of Object.keys(m.exits)) {
      if (m.exits[dir].map === id) { delete m.exits[dir]; delete m.exitTiles[dir]; }
    }
  }
  if (project.startMap === id) project.startMap = Object.keys(project.maps)[0];
  switchMap(Object.keys(project.maps)[0]);
}

// ═══════════════════════════════════════════════════════════════════════════════
// ENTITY OPERATIONS
// ═══════════════════════════════════════════════════════════════════════════════
function selectEntityAt(x, y) {
  const map = curMap();
  // Check NPCs first
  for (let i = 0; i < map.npcs.length; i++) {
    if (map.npcs[i].x === x && map.npcs[i].y === y) {
      ed.selType = 'npc'; ed.selIndex = i; updateProperties(); render(); return true;
    }
  }
  // Enemies
  for (let i = 0; i < map.enemies.length; i++) {
    if (map.enemies[i].x === x && map.enemies[i].y === y) {
      ed.selType = 'enemy'; ed.selIndex = i; updateProperties(); render(); return true;
    }
  }
  // Items
  for (let i = 0; i < map.items.length; i++) {
    if (map.items[i].x === x && map.items[i].y === y) {
      ed.selType = 'item'; ed.selIndex = i; updateProperties(); render(); return true;
    }
  }
  // Door portals
  const portals = project.doorPortals[ed.currentMap] || [];
  for (let i = 0; i < portals.length; i++) {
    if (portals[i].x === x && portals[i].y === y) {
      ed.selType = 'doorPortal'; ed.selIndex = i; updateProperties(); render(); return true;
    }
  }
  ed.selType = null; ed.selIndex = -1;
  updateProperties(); render();
  return false;
}

function placeNpc(x, y) {
  const map = curMap();
  map.npcs.push({ x, y, name:'NPC', color:'#7eb8da', dir:0, dialogue:['Hello!'], npcType:'normal' });
  ed.selType = 'npc'; ed.selIndex = map.npcs.length - 1;
  setTool('select', true);
}

function placeEnemy(x, y) {
  const map = curMap();
  const firstType = Object.keys(project.enemyTypes)[0] || 'slime';
  map.enemies.push({ x, y, type: firstType });
  ed.selType = 'enemy'; ed.selIndex = map.enemies.length - 1;
  setTool('select', true);
}

function placeItem(x, y) {
  const map = curMap();
  const firstItem = Object.keys(project.items)[0] || 'herb';
  map.items.push({ x, y, item: firstItem });
  ed.selType = 'item'; ed.selIndex = map.items.length - 1;
  setTool('select', true);
}

function placeDoorPortal(x, y) {
  // Set tile to door
  curMap().tiles[y][x] = 5;
  if (!project.doorPortals[ed.currentMap]) project.doorPortals[ed.currentMap] = [];
  const maps = Object.keys(project.maps).filter(m => m !== ed.currentMap);
  const targetMap = maps[0] || ed.currentMap;
  project.doorPortals[ed.currentMap].push({ x, y, map: targetMap, spawnX:9, spawnY:9, locked:false, unlockFlag:'', lockedMsg:'' });
  ed.selType = 'doorPortal'; ed.selIndex = project.doorPortals[ed.currentMap].length - 1;
  setTool('select', true);
}

function deleteSelected() {
  if (!ed.selType) return;
  const map = curMap();
  if (ed.selType === 'npc') map.npcs.splice(ed.selIndex, 1);
  else if (ed.selType === 'enemy') map.enemies.splice(ed.selIndex, 1);
  else if (ed.selType === 'item') map.items.splice(ed.selIndex, 1);
  else if (ed.selType === 'doorPortal') {
    const portals = project.doorPortals[ed.currentMap] || [];
    portals.splice(ed.selIndex, 1);
    if (portals.length === 0) delete project.doorPortals[ed.currentMap];
  }
  ed.selType = null; ed.selIndex = -1;
  updateProperties(); render();
}

// ═══════════════════════════════════════════════════════════════════════════════
// FLOOD FILL
// ═══════════════════════════════════════════════════════════════════════════════
function floodFill(x, y, newTile) {
  const tiles = curMap().tiles;
  const oldTile = tiles[y][x];
  if (oldTile === newTile) return;
  pushUndo();
  const stack = [[x, y]];
  const visited = new Set();
  while (stack.length) {
    const [cx, cy] = stack.pop();
    const key = cy * COLS + cx;
    if (visited.has(key)) continue;
    if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS) continue;
    if (tiles[cy][cx] !== oldTile) continue;
    visited.add(key);
    tiles[cy][cx] = newTile;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ENTITY LIST (left panel)
// ═══════════════════════════════════════════════════════════════════════════════
function updateEntityList() {
  const list = document.getElementById('entityList');
  const map = curMap();
  let html = '';

  map.npcs.forEach((npc, i) => {
    const sel = ed.selType === 'npc' && ed.selIndex === i ? ' selected' : '';
    html += `<div class="entity-item${sel}" data-type="npc" data-idx="${i}">
      <span class="entity-dot" style="background:${npc.color||'#7eb8da'}"></span>
      <span>${npc.name} (${npc.x},${npc.y})</span>
    </div>`;
  });
  map.enemies.forEach((en, i) => {
    const sel = ed.selType === 'enemy' && ed.selIndex === i ? ' selected' : '';
    const def = project.enemyTypes[en.type];
    html += `<div class="entity-item${sel}" data-type="enemy" data-idx="${i}">
      <span class="entity-dot" style="background:${def?.color||'#e55'}"></span>
      <span>${en.type} (${en.x},${en.y})</span>
    </div>`;
  });
  map.items.forEach((it, i) => {
    const sel = ed.selType === 'item' && ed.selIndex === i ? ' selected' : '';
    const def = project.items[it.item];
    html += `<div class="entity-item${sel}" data-type="item" data-idx="${i}">
      <span class="entity-dot" style="background:${def?.color||'#aaa'}"></span>
      <span>${it.item} (${it.x},${it.y})</span>
    </div>`;
  });
  const portals = project.doorPortals[ed.currentMap] || [];
  portals.forEach((p, i) => {
    const sel = ed.selType === 'doorPortal' && ed.selIndex === i ? ' selected' : '';
    html += `<div class="entity-item${sel}" data-type="doorPortal" data-idx="${i}">
      <span class="entity-dot" style="background:#e8c170"></span>
      <span>Door→${p.map} (${p.x},${p.y})</span>
    </div>`;
  });

  if (!html) html = '<div style="color:var(--text2);font-size:11px;padding:4px">No entities on this map</div>';
  list.innerHTML = html;

  list.querySelectorAll('.entity-item').forEach(el => {
    el.addEventListener('click', () => {
      ed.selType = el.dataset.type;
      ed.selIndex = parseInt(el.dataset.idx);
      setTool('select', true);
    });
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// PROPERTIES PANEL
// ═══════════════════════════════════════════════════════════════════════════════
function updateProperties() {
  const panel = document.getElementById('propsContent');
  if (ed.selType === 'npc') panel.innerHTML = renderNpcProps();
  else if (ed.selType === 'enemy') panel.innerHTML = renderEnemyProps();
  else if (ed.selType === 'item') panel.innerHTML = renderItemProps();
  else if (ed.selType === 'doorPortal') panel.innerHTML = renderDoorProps();
  else panel.innerHTML = renderMapProps();
  bindPropsEvents();
}

function renderMapProps() {
  const map = curMap();
  const mapKeys = Object.keys(project.maps);
  let html = '<h3>Map Properties</h3><div class="prop-group">';
  html += `<label>Map Name</label><input id="propMapName" value="${esc(map.name)}">`;
  html += `<label>Start Map</label><select id="propStartMap">`;
  mapKeys.forEach(k => html += `<option value="${k}" ${project.startMap===k?'selected':''}>${project.maps[k].name}</option>`);
  html += '</select></div>';

  // Exits
  html += '<h3>Exits</h3>';
  for (const dir of ['north','south','east','west']) {
    const exit = map.exits[dir];
    const tiles = (map.exitTiles[dir] || []).join(',');
    const hasExit = !!exit;
    html += `<div class="prop-group" style="border-left:3px solid ${hasExit?'var(--green)':'var(--border)'};padding-left:8px;margin-bottom:8px">`;
    html += `<div class="row"><strong style="color:var(--accent);width:50px">${dir}</strong>`;
    html += `<label style="margin:0;display:inline"><input type="checkbox" class="exit-toggle" data-dir="${dir}" ${hasExit?'checked':''}> Enabled</label></div>`;
    if (hasExit) {
      html += `<div class="row" style="margin-top:4px">`;
      html += `<div><label>Target Map</label><select class="exit-map" data-dir="${dir}">`;
      mapKeys.filter(k=>k!==ed.currentMap).forEach(k => html += `<option value="${k}" ${exit.map===k?'selected':''}>${project.maps[k].name}</option>`);
      html += '</select></div>';
      html += `<div><label>Spawn X</label><input type="number" class="exit-sx" data-dir="${dir}" value="${exit.spawnX}" min="0" max="19"></div>`;
      html += `<div><label>Spawn Y</label><input type="number" class="exit-sy" data-dir="${dir}" value="${exit.spawnY}" min="0" max="14"></div>`;
      html += '</div>';
      html += `<label>Exit Tiles (${dir==='north'||dir==='south'?'columns':'rows'}, comma-sep)</label>`;
      html += `<input class="exit-tiles" data-dir="${dir}" value="${tiles}" placeholder="e.g. 8,9,10">`;
    }
    html += '</div>';
  }

  return html;
}

function renderNpcProps() {
  const npc = curMap().npcs[ed.selIndex];
  if (!npc) return renderMapProps();
  const itemKeys = Object.keys(project.items);
  const npcType = npc.trader ? 'trader' : (npc.questGive ? 'quest' : 'normal');
  let html = '<h3>NPC Properties</h3><div class="prop-group">';
  html += `<label>Name</label><input id="propNpcName" value="${esc(npc.name)}">`;
  html += `<label>Color</label><div class="color-row"><input type="color" id="propNpcColorPick" value="${npc.color||'#7eb8da'}"><input type="text" id="propNpcColor" value="${npc.color||'#7eb8da'}"></div>`;
  html += `<div class="row"><div><label>X</label><input type="number" id="propNpcX" value="${npc.x}" min="0" max="19"></div>`;
  html += `<div><label>Y</label><input type="number" id="propNpcY" value="${npc.y}" min="0" max="14"></div>`;
  html += `<div><label>Dir</label><select id="propNpcDir">${DIR_NAMES.map((d,i)=>`<option value="${i}" ${npc.dir===i?'selected':''}>${d}</option>`).join('')}</select></div></div>`;
  html += `<label>Type</label><select id="propNpcType"><option value="normal" ${npcType==='normal'?'selected':''}>Normal</option><option value="trader" ${npcType==='trader'?'selected':''}>Trader</option><option value="quest" ${npcType==='quest'?'selected':''}>Quest Giver</option></select>`;
  html += '</div>';

  // Dialogue
  html += '<h3>Dialogue</h3><div class="prop-group">';
  html += `<textarea id="propNpcDialogue" rows="6" placeholder="One line per dialogue entry">${(npc.dialogue||[]).join('\n')}</textarea>`;
  html += '</div>';

  // Trader
  if (npcType === 'trader') {
    html += '<h3>Trades</h3><div class="prop-group">';
    (npc.trades || []).forEach((t, i) => {
      html += `<div class="trade-row" data-trade="${i}">`;
      html += `<select class="trade-give" data-i="${i}">${itemKeys.map(k=>`<option value="${k}" ${t.give===k?'selected':''}>${project.items[k].name}</option>`).join('')}</select>`;
      html += `<span>×</span><input type="number" class="trade-giveq" data-i="${i}" value="${t.giveQty||1}" min="1" style="width:36px">`;
      html += `<span>→</span>`;
      html += `<select class="trade-recv" data-i="${i}">${itemKeys.map(k=>`<option value="${k}" ${t.receive===k?'selected':''}>${project.items[k].name}</option>`).join('')}</select>`;
      html += `<span>×</span><input type="number" class="trade-recvq" data-i="${i}" value="${t.receiveQty||1}" min="1" style="width:36px">`;
      html += `<button class="danger trade-del" data-i="${i}" style="padding:2px 6px">×</button>`;
      html += '</div>';
    });
    html += `<button class="success" id="addTrade" style="margin-top:4px">+ Add Trade</button>`;
    html += '</div>';
  }

  // Quest
  if (npcType === 'quest') {
    const qg = npc.questGive || {};
    html += '<h3>Quest Reward</h3><div class="prop-group">';
    html += `<label>Flag Name</label><input id="propQuestFlag" value="${esc(qg.flag||'')}">`;
    html += `<label>Reward Item</label><select id="propQuestItem"><option value="">None</option>${itemKeys.map(k=>`<option value="${k}" ${qg.item===k?'selected':''}>${project.items[k].name}</option>`).join('')}</select>`;
    html += '</div>';
  }

  // Movement / Alive
  html += '<h3>Movement</h3><div class="prop-group">';
  html += '<div style="font-size:10px;color:var(--text2);margin-bottom:6px">Make NPCs feel alive by letting them wander or patrol.</div>';
  html += `<label>Behavior</label><select id="propNpcMovement">`;
  const movType = npc.patrol && npc.patrol.length ? 'patrol' : npc.wander ? 'wander' : 'static';
  html += `<option value="static" ${movType==='static'?'selected':''}>Static (stays in place)</option>`;
  html += `<option value="wander" ${movType==='wander'?'selected':''}>Wander (random nearby)</option>`;
  html += `<option value="patrol" ${movType==='patrol'?'selected':''}>Patrol (follow waypoints)</option>`;
  html += '</select>';

  // Wander settings
  html += `<div id="wanderSettings" style="display:${movType==='wander'?'block':'none'};margin-top:6px">`;
  html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">';
  html += `<div><label style="margin:0;font-size:10px">Radius</label><input type="number" id="propWanderRadius" value="${npc.wanderRadius||3}" min="1" max="8"><div style="font-size:8px;color:var(--text2)">tiles from origin</div></div>`;
  html += `<div><label style="margin:0;font-size:10px">Speed</label><input type="number" id="propNpcSpeed" value="${npc.speed||2}" min="0.5" max="6" step="0.5"><div style="font-size:8px;color:var(--text2)">move speed</div></div>`;
  html += `<div><label style="margin:0;font-size:10px">Pause</label><input type="number" id="propNpcPause" value="${npc.pauseTime||3}" min="1" max="10" step="0.5"><div style="font-size:8px;color:var(--text2)">sec between moves</div></div>`;
  html += '</div></div>';

  // Patrol settings
  html += `<div id="patrolSettings" style="display:${movType==='patrol'?'block':'none'};margin-top:6px">`;
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">';
  html += `<div><label style="margin:0;font-size:10px">Speed</label><input type="number" id="propPatrolSpeed" value="${npc.speed||2}" min="0.5" max="6" step="0.5"></div>`;
  html += `<div><label style="margin:0;font-size:10px">Pause</label><input type="number" id="propPatrolPause" value="${npc.pauseTime||3}" min="1" max="10" step="0.5"><div style="font-size:8px;color:var(--text2)">sec at waypoints</div></div>`;
  html += '</div>';
  const patrol = npc.patrol || [];
  if (patrol.length) {
    html += '<div style="font-size:11px;margin-bottom:4px">';
    patrol.forEach((p,i) => html += `<span style="color:var(--accent)">[${p[0]},${p[1]}]</span>${i<patrol.length-1?' → ':''}`);
    html += '</div>';
  }
  html += `<div class="inline-btns"><button id="editPatrol" class="primary">Edit Path</button><button id="clearPatrol" class="danger">Clear</button></div>`;
  html += '</div>';

  html += '</div>';

  html += `<div style="margin-top:16px"><button class="danger" id="deleteEntity">Delete NPC</button></div>`;
  return html;
}

function renderEnemyProps() {
  const en = curMap().enemies[ed.selIndex];
  if (!en) return renderMapProps();
  const typeKeys = Object.keys(project.enemyTypes);
  let html = '<h3>Enemy Properties</h3><div class="prop-group">';
  html += `<label>Type</label><select id="propEnemyType">${typeKeys.map(k=>`<option value="${k}" ${en.type===k?'selected':''}>${project.enemyTypes[k].name} (${k})</option>`).join('')}</select>`;
  html += `<div class="row"><div><label>X</label><input type="number" id="propEnemyX" value="${en.x}" min="0" max="19"></div>`;
  html += `<div><label>Y</label><input type="number" id="propEnemyY" value="${en.y}" min="0" max="14"></div></div>`;
  html += '</div>';

  const def = project.enemyTypes[en.type];
  if (def) {
    const diff = getDifficultyLabel(def);
    const dps = (def.atk * def.speed).toFixed(1);
    const threat = Math.round(def.hp * def.atk * def.speed);

    html += '<h3>Type Stats</h3><div class="prop-group">';
    html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">`;
    html += `<span style="font-size:11px;padding:2px 8px;border-radius:3px;background:${diff.color};color:#fff;font-weight:700">${diff.label}</span>`;
    html += `<span style="font-size:11px;color:var(--text2)">Threat: ${threat}</span>`;
    html += '</div>';

    // Stat bars for visual representation
    const maxHP = 100, maxATK = 10, maxSPD = 2.0;
    html += '<div style="margin-bottom:6px">';
    html += renderStatBar('HP', def.hp, maxHP, '#e74c3c');
    html += renderStatBar('ATK', def.atk, maxATK, '#e67e22');
    html += renderStatBar('SPEED', def.speed, maxSPD, '#3498db');
    html += renderStatBar('XP', def.xp, 150, '#f1c40f');
    html += '</div>';

    html += `<div style="font-size:10px;color:var(--text2);margin-top:4px">`;
    html += `DPS: <strong>${dps}</strong> · `;
    html += `Hits to kill (base ATK 2): <strong>${Math.ceil(def.hp/2)}</strong> · `;
    html += `Drops: <strong>${(def.drops||[]).join(', ')||'none'}</strong>`;
    html += '</div>';

    // Super ability badges
    const abilities = [];
    if (def.canDash) abilities.push('⚡ Dash');
    if (def.ranged) abilities.push('🏹 Ranged');
    if (def.chaseDistance === 0) abilities.push('👁 Infinite Chase');
    else if (def.chaseDistance && def.chaseDistance > 5) abilities.push('👁 Extended Chase');
    if (abilities.length) {
      html += `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">`;
      for (const a of abilities) {
        html += `<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(255,60,60,.15);color:#ff6666;border:1px solid rgba(255,60,60,.2)">${a}</span>`;
      }
      html += '</div>';
    }

    // Quick difficulty adjustment
    html += '<label>Quick Adjust</label>';
    html += '<div style="display:flex;gap:4px;flex-wrap:wrap">';
    for (const [key, p] of Object.entries(DIFFICULTY_PRESETS)) {
      html += `<button class="quickPreset" data-preset="${key}" style="font-size:10px;padding:2px 6px" title="${p.desc}">${p.label}</button>`;
    }
    html += '</div>';

    html += '</div>';
  }

  html += `<div style="margin-top:12px"><button class="primary" id="editEnemyType" style="width:100%;margin-bottom:6px">Edit All Enemy Types</button></div>`;
  html += `<div><button class="danger" id="deleteEntity" style="width:100%">Delete Enemy</button></div>`;
  return html;
}

function renderStatBar(label, value, max, color) {
  const pct = Math.min(100, (value / max) * 100);
  return `<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
    <span style="font-size:9px;color:var(--text2);width:36px;text-align:right">${label}</span>
    <div style="flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:4px"></div>
    </div>
    <span style="font-size:10px;color:var(--text);width:30px">${value}</span>
  </div>`;
}

function renderItemProps() {
  const it = curMap().items[ed.selIndex];
  if (!it) return renderMapProps();
  const itemKeys = Object.keys(project.items);
  let html = '<h3>Map Item Properties</h3><div class="prop-group">';
  html += `<label>Item</label><select id="propItemType">${itemKeys.map(k=>`<option value="${k}" ${it.item===k?'selected':''}>${project.items[k].name} (${k})</option>`).join('')}</select>`;
  html += `<div class="row"><div><label>X</label><input type="number" id="propItemX" value="${it.x}" min="0" max="19"></div>`;
  html += `<div><label>Y</label><input type="number" id="propItemY" value="${it.y}" min="0" max="14"></div></div>`;
  const def = project.items[it.item];
  if (def) {
    html += `<h4>Item Info</h4><div style="font-size:11px;color:var(--text2)">${def.desc}</div>`;
  }
  html += '</div>';
  html += `<div style="margin-top:16px"><button class="danger" id="deleteEntity">Delete Item</button></div>`;
  return html;
}

function renderDoorProps() {
  const portals = project.doorPortals[ed.currentMap] || [];
  const p = portals[ed.selIndex];
  if (!p) return renderMapProps();
  const mapKeys = Object.keys(project.maps).filter(k => k !== ed.currentMap);
  let html = '<h3>Door Portal Properties</h3><div class="prop-group">';
  html += `<div class="row"><div><label>X</label><input type="number" id="propDoorX" value="${p.x}" min="0" max="19"></div>`;
  html += `<div><label>Y</label><input type="number" id="propDoorY" value="${p.y}" min="0" max="14"></div></div>`;
  html += `<label>Target Map</label><select id="propDoorMap">${mapKeys.map(k=>`<option value="${k}" ${p.map===k?'selected':''}>${project.maps[k].name}</option>`).join('')}</select>`;
  html += `<div class="row"><div><label>Spawn X</label><input type="number" id="propDoorSX" value="${p.spawnX}" min="0" max="19"></div>`;
  html += `<div><label>Spawn Y</label><input type="number" id="propDoorSY" value="${p.spawnY}" min="0" max="14"></div></div>`;
  html += `<label><input type="checkbox" id="propDoorLocked" ${p.locked?'checked':''}> Locked</label>`;
  if (p.locked) {
    html += `<label>Unlock Flag</label><input id="propDoorFlag" value="${esc(p.unlockFlag||'')}">`;
    html += `<label>Locked Message</label><input id="propDoorMsg" value="${esc(p.lockedMsg||'')}">`;
  }
  html += '</div>';
  html += `<div style="margin-top:16px"><button class="danger" id="deleteEntity">Delete Portal</button></div>`;
  return html;
}

function esc(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

// ═══════════════════════════════════════════════════════════════════════════════
// PROPERTIES EVENT BINDING
// ═══════════════════════════════════════════════════════════════════════════════
function bindPropsEvents() {
  const panel = document.getElementById('propsContent');

  // Map props
  bindInput('propMapName', v => { curMap().name = v; updateMapSelect(); });
  bindSelect('propStartMap', v => { project.startMap = v; });

  // Exit toggles
  panel.querySelectorAll('.exit-toggle').forEach(cb => {
    cb.addEventListener('change', () => {
      const dir = cb.dataset.dir;
      if (cb.checked) {
        const maps = Object.keys(project.maps).filter(k => k !== ed.currentMap);
        curMap().exits[dir] = { map: maps[0] || ed.currentMap, spawnX: 9, spawnY: dir==='north'?13:(dir==='south'?1:9) };
        curMap().exitTiles[dir] = [9];
      } else {
        delete curMap().exits[dir]; delete curMap().exitTiles[dir];
      }
      updateProperties(); render();
    });
  });
  panel.querySelectorAll('.exit-map').forEach(sel => {
    sel.addEventListener('change', () => { curMap().exits[sel.dataset.dir].map = sel.value; });
  });
  panel.querySelectorAll('.exit-sx').forEach(inp => {
    inp.addEventListener('input', () => { curMap().exits[inp.dataset.dir].spawnX = parseInt(inp.value)||0; });
  });
  panel.querySelectorAll('.exit-sy').forEach(inp => {
    inp.addEventListener('input', () => { curMap().exits[inp.dataset.dir].spawnY = parseInt(inp.value)||0; });
  });
  panel.querySelectorAll('.exit-tiles').forEach(inp => {
    inp.addEventListener('input', () => {
      curMap().exitTiles[inp.dataset.dir] = inp.value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
      render();
    });
  });

  // NPC props
  if (ed.selType === 'npc' && curMap().npcs[ed.selIndex]) {
    const npc = curMap().npcs[ed.selIndex];
    bindInput('propNpcName', v => { npc.name = v; render(); });
    bindInput('propNpcColor', v => { npc.color = v; const pick = document.getElementById('propNpcColorPick'); if(pick) pick.value = v; render(); });
    const colorPick = document.getElementById('propNpcColorPick');
    if (colorPick) colorPick.addEventListener('input', () => { npc.color = colorPick.value; const txt = document.getElementById('propNpcColor'); if(txt) txt.value = colorPick.value; render(); });
    bindNumber('propNpcX', v => { npc.x = v; render(); });
    bindNumber('propNpcY', v => { npc.y = v; render(); });
    bindSelect('propNpcDir', v => { npc.dir = parseInt(v); render(); });
    bindSelect('propNpcType', v => {
      delete npc.trader; delete npc.trades; delete npc.questGive;
      npc.npcType = v;
      if (v === 'trader') { npc.trader = true; npc.trades = npc.trades || []; }
      if (v === 'quest') { npc.questGive = { flag: '', item: '' }; }
      updateProperties(); render();
    });
    const dlg = document.getElementById('propNpcDialogue');
    if (dlg) dlg.addEventListener('input', () => { npc.dialogue = dlg.value.split('\n').filter(l => l.trim()); });

    // Trades
    panel.querySelectorAll('.trade-give').forEach(sel => {
      sel.addEventListener('change', () => { npc.trades[sel.dataset.i].give = sel.value; });
    });
    panel.querySelectorAll('.trade-giveq').forEach(inp => {
      inp.addEventListener('input', () => { npc.trades[inp.dataset.i].giveQty = parseInt(inp.value)||1; });
    });
    panel.querySelectorAll('.trade-recv').forEach(sel => {
      sel.addEventListener('change', () => { npc.trades[sel.dataset.i].receive = sel.value; });
    });
    panel.querySelectorAll('.trade-recvq').forEach(inp => {
      inp.addEventListener('input', () => { npc.trades[inp.dataset.i].receiveQty = parseInt(inp.value)||1; });
    });
    panel.querySelectorAll('.trade-del').forEach(btn => {
      btn.addEventListener('click', () => { npc.trades.splice(parseInt(btn.dataset.i), 1); updateProperties(); });
    });
    const addTrade = document.getElementById('addTrade');
    if (addTrade) addTrade.addEventListener('click', () => {
      const keys = Object.keys(project.items);
      npc.trades = npc.trades || [];
      npc.trades.push({ give: keys[0]||'herb', giveQty:1, receive: keys[0]||'herb', receiveQty:1 });
      updateProperties();
    });

    // Quest
    bindInput('propQuestFlag', v => { if(npc.questGive) npc.questGive.flag = v; });
    bindSelect('propQuestItem', v => { if(npc.questGive) npc.questGive.item = v; });

    // Movement behavior
    bindSelect('propNpcMovement', v => {
      if (v === 'static') { delete npc.wander; delete npc.patrol; }
      else if (v === 'wander') { npc.wander = true; delete npc.patrol; npc.wanderRadius = npc.wanderRadius || 3; npc.speed = npc.speed || 2; npc.pauseTime = npc.pauseTime || 3; }
      else if (v === 'patrol') { delete npc.wander; npc.patrol = npc.patrol || [[npc.x, npc.y]]; npc.speed = npc.speed || 2; npc.pauseTime = npc.pauseTime || 3; }
      updateProperties(); render();
    });
    bindNumber('propWanderRadius', v => { npc.wanderRadius = v; });
    bindNumber('propNpcSpeed', v => { npc.speed = v; }, true);
    bindNumber('propNpcPause', v => { npc.pauseTime = v; }, true);
    bindNumber('propPatrolSpeed', v => { npc.speed = v; }, true);
    bindNumber('propPatrolPause', v => { npc.pauseTime = v; }, true);

    // Patrol
    const editPatrol = document.getElementById('editPatrol');
    if (editPatrol) editPatrol.addEventListener('click', () => startPatrolEdit(npc));
    const clearPatrol = document.getElementById('clearPatrol');
    if (clearPatrol) clearPatrol.addEventListener('click', () => { delete npc.patrol; updateProperties(); render(); });
  }

  // Enemy props
  if (ed.selType === 'enemy' && curMap().enemies[ed.selIndex]) {
    const en = curMap().enemies[ed.selIndex];
    bindSelect('propEnemyType', v => { en.type = v; updateProperties(); render(); });
    bindNumber('propEnemyX', v => { en.x = v; render(); });
    bindNumber('propEnemyY', v => { en.y = v; render(); });
    // Quick preset buttons in properties panel
    panel.querySelectorAll('.quickPreset').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = DIFFICULTY_PRESETS[btn.dataset.preset];
        if (!p) return;
        const def = project.enemyTypes[en.type];
        if (def) {
          def.hp = p.hp; def.atk = p.atk; def.xp = p.xp; def.speed = p.speed;
          updateProperties(); render();
        }
      });
    });
    // Edit All Enemy Types button
    const editBtn = document.getElementById('editEnemyType');
    if (editBtn) editBtn.addEventListener('click', showEnemyDefs);
  }

  // Item props
  if (ed.selType === 'item' && curMap().items[ed.selIndex]) {
    const it = curMap().items[ed.selIndex];
    bindSelect('propItemType', v => { it.item = v; updateProperties(); render(); });
    bindNumber('propItemX', v => { it.x = v; render(); });
    bindNumber('propItemY', v => { it.y = v; render(); });
  }

  // Door portal props
  if (ed.selType === 'doorPortal') {
    const portals = project.doorPortals[ed.currentMap] || [];
    const p = portals[ed.selIndex];
    if (p) {
      bindNumber('propDoorX', v => { p.x = v; curMap().tiles[p.y][v] = 5; render(); });
      bindNumber('propDoorY', v => { p.y = v; curMap().tiles[v][p.x] = 5; render(); });
      bindSelect('propDoorMap', v => { p.map = v; });
      bindNumber('propDoorSX', v => { p.spawnX = v; });
      bindNumber('propDoorSY', v => { p.spawnY = v; });
      const lockCb = document.getElementById('propDoorLocked');
      if (lockCb) lockCb.addEventListener('change', () => { p.locked = lockCb.checked; updateProperties(); });
      bindInput('propDoorFlag', v => { p.unlockFlag = v; });
      bindInput('propDoorMsg', v => { p.lockedMsg = v; });
    }
  }

  // Delete button
  const delBtn = document.getElementById('deleteEntity');
  if (delBtn) delBtn.addEventListener('click', deleteSelected);
}

function bindInput(id, fn) {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', () => fn(el.value));
}
function bindNumber(id, fn, isFloat) {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', () => fn(isFloat ? (parseFloat(el.value)||0) : (parseInt(el.value)||0)));
}
function bindSelect(id, fn) {
  const el = document.getElementById(id);
  if (el) el.addEventListener('change', () => fn(el.value));
}

// PATROL PATH EDITING
// ═══════════════════════════════════════════════════════════════════════════════
let patrolEditNpc = null;

function startPatrolEdit(npc) {
  patrolEditNpc = npc;
  npc.patrol = [];
  ed.tool = 'patrol';
  document.getElementById('statusTool').textContent = 'PATROL: Click waypoints, then press Enter or Escape';
  canvas.style.cursor = 'crosshair';
}

function addPatrolWaypoint(x, y) {
  if (!patrolEditNpc) return;
  patrolEditNpc.patrol.push([x, y]);
  render();
  // Draw patrol points
  const patrol = patrolEditNpc.patrol;
  ctx.strokeStyle = '#f0d890';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  patrol.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p[0]*TILE+16, p[1]*TILE+16);
    else ctx.lineTo(p[0]*TILE+16, p[1]*TILE+16);
  });
  ctx.stroke();
  ctx.setLineDash([]);
  patrol.forEach((p, i) => {
    ctx.fillStyle = '#e8c170';
    ctx.beginPath(); ctx.arc(p[0]*TILE+16, p[1]*TILE+16, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(i+1, p[0]*TILE+16, p[1]*TILE+19);
  });
}

function finishPatrolEdit() {
  patrolEditNpc = null;
  ed.tool = 'select';
  updateProperties(); render();
}

// Difficulty presets for quick enemy tuning
const DIFFICULTY_PRESETS = {
  fodder:   { hp:5,  atk:1, xp:5,   speed:0.6, label:'Fodder',   desc:'Weak trash mob, dies fast' },
  easy:     { hp:8,  atk:2, xp:10,  speed:0.8, label:'Easy',     desc:'Standard early-game enemy' },
  medium:   { hp:15, atk:3, xp:20,  speed:0.9, label:'Medium',   desc:'Mid-game challenge' },
  hard:     { hp:22, atk:5, xp:35,  speed:1.0, label:'Hard',     desc:'Late-game threat' },
  elite:    { hp:35, atk:6, xp:50,  speed:1.1, label:'Elite',    desc:'Powerful elite enemy' },
  miniboss: { hp:50, atk:7, xp:80,  speed:0.5, label:'Mini-Boss', desc:'Slow but devastating' },
  boss:     { hp:80, atk:8, xp:150, speed:0.4, label:'Boss',     desc:'End-game boss encounter' },
  swarm:    { hp:3,  atk:1, xp:3,   speed:1.4, label:'Swarm',    desc:'Very fast, very fragile' },
  tank:     { hp:40, atk:3, xp:40,  speed:0.3, label:'Tank',     desc:'Extremely slow, huge HP' },
  berserker:{ hp:12, atk:8, xp:45,  speed:1.2, label:'Berserker',desc:'Glass cannon, fast & deadly' },
};

function getDifficultyLabel(en) {
  if (en.hp >= 60) return { label:'BOSS', color:'#e74c3c' };
  if (en.hp >= 35) return { label:'ELITE', color:'#e67e22' };
  if (en.hp >= 20) return { label:'HARD', color:'#f1c40f' };
  if (en.hp >= 12) return { label:'MEDIUM', color:'#3498db' };
  if (en.hp >= 6)  return { label:'EASY', color:'#27ae60' };
  return { label:'FODDER', color:'#95a5a6' };
}

        name: card.querySelector('.eName').value,
        color: card.querySelector('.eColor').value,
        hp: parseInt(card.querySelector('.eHP').value) || 10,
        atk: parseInt(card.querySelector('.eATK').value) || 2,
        xp: parseInt(card.querySelector('.eXP').value) || 10,
        speed: parseFloat(card.querySelector('.eSpd').value) || 0.8,
        drops: card.querySelector('.eDrops').value.split(',').map(s=>s.trim()).filter(Boolean),
      };
      // Super enemy abilities
      const canDash = card.querySelector('.eCanDash')?.checked;
      const ranged = card.querySelector('.eRanged')?.checked;
      const infChase = card.querySelector('.eInfChase')?.checked;
      const chaseRange = parseInt(card.querySelector('.eChaseRange')?.value);
      if (canDash) {
        etObj.canDash = true;
        etObj.dashDist = parseInt(card.querySelector('.eDashDist')?.value) || 3;
        etObj.dashCooldown = parseFloat(card.querySelector('.eDashCD')?.value) || 1.5;
      }
      if (ranged) {
        etObj.ranged = true;
        etObj.rangedCooldown = parseFloat(card.querySelector('.eRangedCD')?.value) || 2;
        etObj.rangedDmg = parseInt(card.querySelector('.eRangedDmg')?.value) || Math.max(1, Math.floor(etObj.atk * 0.7));
        etObj.rangedColor = card.querySelector('.eRangedColor')?.value || '#ff3366';
      }
      if (infChase || (chaseRange !== undefined && chaseRange !== 5)) {
        etObj.chaseDistance = infChase ? 0 : (chaseRange || 5);
      }
      newTypes[newId] = etObj;
    });
    project.enemyTypes = newTypes;
    closeModal();
    updateProperties(); render();
  });
}
