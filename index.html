function generateExport() {
  // Compute solidTiles and treeTiles from TILE_INFO
  const usedTiles = new Set();
  for (const m of Object.values(project.maps)) {
    for (const row of m.tiles) for (const t of row) usedTiles.add(t);
  }
  const solidTiles = [...usedTiles].filter(t => TILE_INFO[t]?.solid).sort((a,b)=>a-b);
  const treeTiles = [...usedTiles].filter(t => TILE_INFO[t]?.tree).sort((a,b)=>a-b);

  // Build config object
  const cfg = {};
  cfg.title = project.title;
  cfg.colors = { ...project.colors };
  cfg.solidTiles = solidTiles;
  cfg.treeTiles = treeTiles;
  cfg.player = { ...project.player };
  cfg.combat = { ...project.combat };
  cfg.startMap = project.startMap;

  // Win condition
  const w = project.winCondition;
  if (w.type === 'item' && w.item) {
    cfg.winCondition = { item: w.item, title: w.title, message: w.message };
  } else if (w.type === 'flag' && w.flag) {
    cfg.winCondition = { flag: w.flag, title: w.title, message: w.message };
  }

  cfg.items = {};
  for (const [id, item] of Object.entries(project.items)) {
    const def = { name: item.name, color: item.color, icon: item.icon, desc: item.desc };
    if (item.heal) def.heal = item.heal;
    if (item.weapon) { def.weapon = true; def.atk = item.atk; }
    cfg.items[id] = def;
  }

  cfg.enemyTypes = {};
  for (const [id, en] of Object.entries(project.enemyTypes)) {
    const etDef = { name:en.name, color:en.color, hp:en.hp, atk:en.atk, xp:en.xp, speed:en.speed, drops:en.drops||[] };
    if (en.canDash) { etDef.canDash = true; etDef.dashDist = en.dashDist || 3; etDef.dashCooldown = en.dashCooldown || 1.5; }
    if (en.ranged) { etDef.ranged = true; etDef.rangedCooldown = en.rangedCooldown || 2; etDef.rangedDmg = en.rangedDmg || Math.max(1, Math.floor(en.atk * 0.7)); etDef.rangedColor = en.rangedColor || '#ff3366'; }
    if (en.chaseDistance !== undefined) etDef.chaseDistance = en.chaseDistance;
    cfg.enemyTypes[id] = etDef;
  }

  cfg.maps = {};
  for (const [id, m] of Object.entries(project.maps)) {
    const mapDef = { name: m.name, tiles: m.tiles };
    // NPCs
    mapDef.npcs = m.npcs.map(npc => {
      const n = { x: npc.x, y: npc.y, name: npc.name, color: npc.color, dir: npc.dir };
      if (npc.dialogue?.length) n.dialogue = npc.dialogue;
      if (npc.trader) { n.trader = true; n.trades = npc.trades || []; }
      if (npc.questGive && npc.questGive.flag) n.questGive = npc.questGive;
      if (npc.wander) { n.wander = true; n.wanderRadius = npc.wanderRadius || 3; }
      if (npc.patrol?.length) n.patrol = npc.patrol;
      if (npc.wander || npc.patrol?.length) {
        if (npc.speed && npc.speed !== 2) n.speed = npc.speed;
        if (npc.pauseTime && npc.pauseTime !== 3) n.pauseTime = npc.pauseTime;
      }
      return n;
    });
    // Exits
    mapDef.exits = m.exits || {};
    mapDef.exitTiles = m.exitTiles || {};
    // Items
    mapDef.items = m.items.map(i => ({ x:i.x, y:i.y, item:i.item }));
    // Enemies
    mapDef.enemies = m.enemies.map(e => ({ x:e.x, y:e.y, type:e.type }));
    cfg.maps[id] = mapDef;
  }

  // Door portals
  if (Object.keys(project.doorPortals).length) {
    cfg.doorPortals = {};
    for (const [mapId, portals] of Object.entries(project.doorPortals)) {
      cfg.doorPortals[mapId] = portals.map(p => {
        const d = { x:p.x, y:p.y, map:p.map, spawnX:p.spawnX, spawnY:p.spawnY, locked:!!p.locked };
        if (p.locked) { d.unlockFlag = p.unlockFlag; d.lockedMsg = p.lockedMsg; }
        return d;
      });
    }
  }

  return cfg;
}

function configToJs(cfg, indent) {
  return JSON.stringify(cfg, null, indent)
    .replace(/"(\w+)":/g, '$1:')                         // unquote keys
    .replace(/:\s*"([^"\\]*(?:\\.[^"\\]*)*)"/g, (m, v) => // single-quote string values
      ": '" + v.replace(/\\"/g, '"').replace(/'/g, "\\'") + "'");
}

function playProject() {
  const cfg = generateExport();
  const cfgStr = configToJs(cfg, 2);
  const engineUrl = 'https://hsingh124.github.io/rpg/rpg-engine.js';
  const gameHtml = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${project.title}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}canvas{image-rendering:pixelated;border:2px solid #333}</style>
</head><body><canvas id="game"></canvas>
<script src="${engineUrl}"><\/script>
<script>
RPG.create(${cfgStr});
<\/script></body></html>`;

  const win = window.open('', '_blank');
  if (win) {
    win.document.open();
    win.document.write(gameHtml);
    win.document.close();
  } else {
    alert("Popup blocked! Please allow popups to play the game.");
  }
}

function showExport() {
  const cfg = generateExport();
  const cfgStr = configToJs(cfg, 2);
  const gameHtml = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${project.title}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}canvas{image-rendering:pixelated;border:2px solid #333}</style>
</head><body><canvas id="game"></canvas>
<script src="https://hsingh124.github.io/rpg/rpg-engine.js"><\/script>
<script>
RPG.create(${cfgStr});
<\/script></body></html>`;

  const html = `
    <p style="font-size:11px;color:var(--text2);margin-bottom:8px">Copy or download the generated game HTML to play.</p>
    <textarea id="exportArea" readonly>${gameHtml.replace(/</g,'&lt;')}</textarea>
  `;
  openModal('Export Game', html, '<button class="primary" id="mCopyExport">Copy to Clipboard</button> <button class="success" id="mDownloadExport">Download HTML</button>', true);

  document.getElementById('exportArea').value = gameHtml;

  document.getElementById('mCopyExport').addEventListener('click', () => {
    navigator.clipboard.writeText(gameHtml).then(() => {
      document.getElementById('mCopyExport').textContent = 'Copied!';
      setTimeout(() => document.getElementById('mCopyExport').textContent = 'Copy to Clipboard', 1500);
    });
  });

  document.getElementById('mDownloadExport').addEventListener('click', () => {
    const blob = new Blob([gameHtml], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = project.title.toLowerCase().replace(/[^a-z0-9]/g, '_') + '.html';
    a.click();
    URL.revokeObjectURL(a.href);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════════════════════════════════════════
function saveProject() {
  const data = JSON.stringify(project);
  localStorage.setItem('rpg_editor_project', data);
  const btn = document.getElementById('btnSave');
  btn.textContent = 'Saved!';
  setTimeout(() => btn.textContent = 'Save', 1500);
}

function loadProject() {
  const data = localStorage.getItem('rpg_editor_project');
  if (!data) return alert('No saved project found.');
  if (!confirm('Load saved project? Current work will be lost.')) return;
  project = JSON.parse(data);
  ed.currentMap = project.startMap || Object.keys(project.maps)[0];
  ed.selType = null; ed.selIndex = -1;
  ed.undoStack = []; ed.undoPointer = -1;
  pushUndo();
  document.getElementById('projectTitle').value = project.title;
  updateMapSelect();
  updateProperties();
  buildPalette();
  render();
}

function loadFromFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        project = JSON.parse(reader.result);
        ed.currentMap = project.startMap || Object.keys(project.maps)[0];
        ed.selType = null; ed.selIndex = -1;
        document.getElementById('projectTitle').value = project.title;
        updateMapSelect(); updateProperties(); buildPalette(); render();
      } catch(e) { alert('Invalid project file.'); }
    };
    reader.readAsText(file);
  });
  input.click();
}

function saveToFile() {
  const blob = new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = project.title.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_project.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ═══════════════════════════════════════════════════════════════════════════════
// STATUS BAR
// ═══════════════════════════════════════════════════════════════════════════════
function updateStatusBar() {
  const toolNames = { paint:'Paint', fill:'Fill', erase:'Erase', select:'Select', place_npc:'Place NPC', place_enemy:'Place Enemy', place_item:'Place Item', place_door:'Place Door', patrol:'Patrol Edit' };
  document.getElementById('statusTool').textContent = 'Tool: ' + (toolNames[ed.tool] || ed.tool);
  const x = ed.hoverX, y = ed.hoverY;
  document.getElementById('statusPos').textContent = x >= 0 ? `Pos: ${x},${y}` : 'Pos: -';
  if (x >= 0 && y >= 0) {
    const t = curMap().tiles[y][x];
    document.getElementById('statusTile').textContent = `Tile: ${TILE_INFO[t]?.name||'?'} (${t})`;
  }
  document.getElementById('statusMap').textContent = `Map: ${curMap().name} [${ed.currentMap}]${project.startMap===ed.currentMap?' ★':''}`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════════════════════
function getGridPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = Math.floor((e.clientX - rect.left) * scaleX / TILE);
  const y = Math.floor((e.clientY - rect.top) * scaleY / TILE);
  return { x: Math.max(0, Math.min(COLS-1, x)), y: Math.max(0, Math.min(ROWS-1, y)) };
}

canvas.addEventListener('mousedown', e => {
  const { x, y } = getGridPos(e);

  if (ed.tool === 'patrol') {
    addPatrolWaypoint(x, y);
    return;
  }

  if (ed.tool === 'select') {
    selectEntityAt(x, y);
    return;
  }

  if (ed.tool === 'place_npc') { placeNpc(x, y); return; }
  if (ed.tool === 'place_enemy') { placeEnemy(x, y); return; }
  if (ed.tool === 'place_item') { placeItem(x, y); return; }
  if (ed.tool === 'place_door') { placeDoorPortal(x, y); return; }

  if (ed.tool === 'fill') {
    floodFill(x, y, ed.selectedTile);
    render();
    return;
  }

  // Paint or erase
  ed.isPainting = true;
  pushUndo();
  const tile = ed.tool === 'erase' ? 0 : ed.selectedTile;
  curMap().tiles[y][x] = tile;
  render();
});

canvas.addEventListener('mousemove', e => {
  const { x, y } = getGridPos(e);
  ed.hoverX = x; ed.hoverY = y;

  if (ed.isPainting && (ed.tool === 'paint' || ed.tool === 'erase')) {
    const tile = ed.tool === 'erase' ? 0 : ed.selectedTile;
    curMap().tiles[y][x] = tile;
  }
  render();
});

canvas.addEventListener('mouseup', () => { ed.isPainting = false; });
canvas.addEventListener('mouseleave', () => { ed.isPainting = false; ed.hoverX = -1; ed.hoverY = -1; render(); });

// Right-click erases
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const { x, y } = getGridPos(e);
  pushUndo();
  curMap().tiles[y][x] = 0;
  render();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  if (ed.tool === 'patrol' && (e.key === 'Enter' || e.key === 'Escape')) {
    finishPatrolEdit();
    return;
  }

  if (e.key === 'p' || e.key === 'P') setTool('paint');
  else if (e.key === 'f' || e.key === 'F') setTool('fill');
  else if (e.key === 'e' || e.key === 'E') setTool('erase');
  else if (e.key === 's' && !e.ctrlKey && !e.metaKey) setTool('select');
  else if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  else if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  else if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveProject(); }

  // Number keys for quick tile select (1-9 → tiles 0-8)
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < TILE_INFO.length) { ed.selectedTile = idx; setTool('paint'); buildPalette(); }
  }
});

// Tool buttons
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => setTool(btn.dataset.tool));
});

// Entity placement buttons
document.querySelectorAll('[data-place]').forEach(btn => {
  btn.addEventListener('click', () => {
    const place = btn.dataset.place;
    const tool = 'place_' + place;
    if (ed.tool === tool) { setTool('select'); return; } // toggle off
    ed.tool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('[data-place]').forEach(b => b.classList.toggle('active', b.dataset.place === place));
    canvas.style.cursor = 'pointer';
    updateStatusBar();
  });
});

// Top bar buttons
document.getElementById('mapSelect').addEventListener('change', e => switchMap(e.target.value));
document.getElementById('btnAddMap').addEventListener('click', addMap);
document.getElementById('btnDelMap').addEventListener('click', deleteMap);
document.getElementById('btnPlayer').addEventListener('click', showPlayerSettings);
document.getElementById('btnItemDefs').addEventListener('click', showItemDefs);
document.getElementById('btnEnemyDefs').addEventListener('click', showEnemyDefs);
document.getElementById('btnColors').addEventListener('click', showColors);
document.getElementById('btnWinCond').addEventListener('click', showWinCondition);
document.getElementById('btnExport').addEventListener('click', showExport);
document.getElementById('btnPlay').addEventListener('click', playProject);
document.getElementById('btnSave').addEventListener('click', saveProject);
document.getElementById('btnLoad').addEventListener('click', loadProject);
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('projectTitle').addEventListener('input', e => { project.title = e.target.value; });

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
function init() {
  // Try auto-load from localStorage
  const saved = localStorage.getItem('rpg_editor_project');
  if (saved) {
    try {
      project = JSON.parse(saved);
      ed.currentMap = project.startMap || Object.keys(project.maps)[0];
      document.getElementById('projectTitle').value = project.title;
    } catch(e) { project = createDefaultProject(); }
  }

  pushUndo();
  buildPalette();
  updateMapSelect();
  updateProperties();
  render();
}

init();
</script>
