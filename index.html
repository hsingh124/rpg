// Initialize enemy instances with HP etc
function initEnemies() {
  for (const mapId of Object.keys(MAP_ENEMIES)) {
    for (const e of MAP_ENEMIES[mapId]) {
      const t = ENEMY_TYPES[e.type];
      e.hp = t.hp;
      e.maxHp = t.hp;
      e.dir = Math.floor(Math.random() * 4);
      e.moveTimer = Math.random() * 2;
      e.animFrame = 0;
      e.hurtTimer = 0;
      e.alive = true;
    }
  }
}

  name: 'Hero', moving: false, moveT: 0, fromX: 9, fromY: 9,
  animFrame: 0, animTimer: 0, speed: 6, runSpeed: 12,
  inventory: [], // array of item ids
  gold: 0,
  baseAtk: 2,
  equippedWeapon: null, // item id
  attacking: false, attackTimer: 0, attackCooldown: 0,
  hurtTimer: 0, iFrames: 0, // invincibility after hit
};

// Floating damage numbers
let damageFloats = [];

// Current map state
let currentMapId = 'village';
let transitionAlpha = 0;
let transitioning = false;
let transitionTarget = null;

function currentMap() { return MAPS[currentMapId]; }

// Game state
let keys = {};
let keyOrder = [];
let dialogueState = null;
let messageQueue = [];
let currentMessage = null;
let messageTimer = 0;
let inventoryOpen = false;
let inventoryCursor = 0;
let tradeOpen = false;
let tradeCursor = 0;
let tradeNpc = null;

// Input
window.addEventListener('keydown', e => {
  const c = e.code;
  if (!keys[c]) { keys[c] = true; keyOrder.push(c); }

  // Inventory toggle
  if (c === 'KeyI' || c === 'Tab') {
    e.preventDefault();
    if (tradeOpen) return;
    inventoryOpen = !inventoryOpen;
    inventoryCursor = 0;
    return;
  }
  // Escape closes any open menu
  if (c === 'Escape') {
    if (tradeOpen) { tradeOpen = false; tradeNpc = null; return; }
    if (inventoryOpen) { inventoryOpen = false; return; }
    if (dialogueState) { dialogueState = null; return; }
    return;
  }

  // Attack
  if (c === 'KeyE' || c === 'KeyX') {
    if (!inventoryOpen && !tradeOpen && !dialogueState) { playerAttack(); }
    return;
  }

  if (c === 'Space' || c === 'Enter') {
    e.preventDefault();
    if (tradeOpen) { executeTrade(); return; }
    if (inventoryOpen) { useOrEquipSelected(); return; }
    handleInteract();
    return;
  }

  // Menu navigation
  if (inventoryOpen || tradeOpen) {
    if (c === 'ArrowUp' || c === 'KeyW') {
      if (inventoryOpen) inventoryCursor = Math.max(0, inventoryCursor - 1);
      if (tradeOpen) tradeCursor = Math.max(0, tradeCursor - 1);
    }
    if (c === 'ArrowDown' || c === 'KeyS') {
      if (inventoryOpen) inventoryCursor = Math.min(getInventoryDisplay().length - 1, inventoryCursor + 1);
      if (tradeOpen && tradeNpc) tradeCursor = Math.min(tradeNpc.trades.length - 1, tradeCursor + 1);
    }
  }
});
window.addEventListener('keyup', e => {
  const c = e.code;
  keys[c] = false;
  keyOrder = keyOrder.filter(k => k !== c);
});

// Returns grouped inventory: [{id, item, qty}]
function getInventoryDisplay() {
  const counts = {};
  for (const id of player.inventory) {
    counts[id] = (counts[id] || 0) + 1;
  }
  return Object.entries(counts).map(([id, qty]) => ({ id, item: ITEMS[id], qty }));
}

function countItem(id) {
  return player.inventory.filter(i => i === id).length;
}

function removeItems(id, qty) {
  let removed = 0;
  player.inventory = player.inventory.filter(i => {
    if (i === id && removed < qty) { removed++; return false; }
    return true;
  });
}

function addItems(id, qty) {
  for (let i = 0; i < qty; i++) player.inventory.push(id);
}

function executeTrade() {
  if (!tradeNpc || !tradeNpc.trades[tradeCursor]) return;
  const t = tradeNpc.trades[tradeCursor];
  if (countItem(t.give) >= t.giveQty) {
    removeItems(t.give, t.giveQty);
    addItems(t.receive, t.receiveQty);
    showMessage(`Traded! Received ${t.receiveQty}x ${ITEMS[t.receive].name}`);
  } else {
    showMessage(`Not enough ${ITEMS[t.give].name}! Need ${t.giveQty}.`);
  }
}

function tryPickupItem() {
  const items = MAP_ITEMS[currentMapId];
  if (!items) return;
  for (let i = items.length - 1; i >= 0; i--) {
    if (items[i].x === player.x && items[i].y === player.y) {
      const picked = items.splice(i, 1)[0];
      player.inventory.push(picked.item);
      showMessage(`Picked up ${ITEMS[picked.item].name}!`);
    }
  }
}

function handleInteract() {
  if (dialogueState) {
    // If this NPC is a trader and we've reached end of dialogue, open trade
    const npc = dialogueState.npc;
    dialogueState.line++;
    if (dialogueState.line >= npc.dialogue.length) {
      dialogueState = null;
      if (npc.trader) {
        tradeOpen = true;
        tradeNpc = npc;
        tradeCursor = 0;
      }
    }
    return;
  }
  // Try pickup at feet first
  tryPickupItem();

  let tx = player.x, ty = player.y;
  if (player.dir === 0) ty++;
  else if (player.dir === 3) ty--;
  else if (player.dir === 1) tx--;
  else if (player.dir === 2) tx++;
  for (const npc of currentMap().npcs) {
    if (npc.x === tx && npc.y === ty) { dialogueState = { npc, line: 0 }; return; }
  }
}

function useOrEquipSelected() {
  const inv = getInventoryDisplay();
  if (!inv[inventoryCursor]) return;
  const entry = inv[inventoryCursor];
  const item = ITEMS[entry.id];
  if (item.weapon) {
    player.equippedWeapon = entry.id;
    showMessage(`Equipped ${item.name}! ATK: ${player.baseAtk + item.atk}`);
  } else if (entry.id === 'potion') {
    removeItems('potion', 1);
    const heal = 8;
    player.hp = Math.min(player.maxHp, player.hp + heal);
    showMessage(`Used Potion! +${heal} HP`);
    if (getInventoryDisplay().length === 0) inventoryCursor = 0;
    else inventoryCursor = Math.min(inventoryCursor, getInventoryDisplay().length - 1);
  }
}

function getPlayerAtk() {
  let atk = player.baseAtk;
  if (player.equippedWeapon && ITEMS[player.equippedWeapon]) {
    atk += ITEMS[player.equippedWeapon].atk;
  }
  return atk;
}

function playerAttack() {
  if (player.attacking || player.attackCooldown > 0) return;
  player.attacking = true;
  player.attackTimer = 0.2;
  player.attackCooldown = 0.35;

  // Find target tile
  let tx = player.x, ty = player.y;
  if (player.dir === 0) ty++;
  else if (player.dir === 3) ty--;
  else if (player.dir === 1) tx--;
  else if (player.dir === 2) tx++;

  const enemies = MAP_ENEMIES[currentMapId] || [];
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.x === tx && e.y === ty) {
      const dmg = getPlayerAtk() + Math.floor(Math.random() * 3);
      e.hp -= dmg;
      e.hurtTimer = 0.2;
      damageFloats.push({ x: e.x * TILE + 16, y: e.y * TILE, text: `-${dmg}`, color: '#fff', timer: 0.8 });
      if (e.hp <= 0) {
        e.alive = false;
        // XP gain
        const et = ENEMY_TYPES[e.type];
        player.xp += et.xp;
        damageFloats.push({ x: e.x * TILE + 16, y: e.y * TILE - 10, text: `+${et.xp} XP`, color: '#f1c40f', timer: 1.2 });
        // Drop item
        if (et.drops.length > 0) {
          const dropId = et.drops[Math.floor(Math.random() * et.drops.length)];
          const items = MAP_ITEMS[currentMapId];
          if (items) items.push({ x: e.x, y: e.y, item: dropId });
        }
        // Level up check
        checkLevelUp();
      }
      break;
    }
  }
}

function checkLevelUp() {
  while (player.xp >= player.maxXp) {
    player.xp -= player.maxXp;
    player.level++;
    player.maxHp += 5;
    player.hp = player.maxHp;
    player.maxMp += 3;
    player.mp = player.maxMp;
    player.baseAtk += 1;
    player.maxXp = Math.floor(player.maxXp * 1.5);
    showMessage(`LEVEL UP! Now Lv.${player.level}  HP+5  ATK+1`);
  }
}

function enemyAI(dt) {
  const enemies = MAP_ENEMIES[currentMapId] || [];
  for (const e of enemies) {
    if (!e.alive) continue;
    const et = ENEMY_TYPES[e.type];

    // Hurt flash timer
    if (e.hurtTimer > 0) e.hurtTimer -= dt;

    // Movement timer
    e.moveTimer -= dt * et.speed;
    if (e.moveTimer > 0) continue;
    e.moveTimer = 1 + Math.random() * 1.5;

    // Chase player if within 5 tiles, otherwise wander
    const distX = player.x - e.x, distY = player.y - e.y;
    const dist = Math.abs(distX) + Math.abs(distY);

    let mx = 0, my = 0;
    if (dist <= 5 && dist > 0) {
      // Chase
      if (Math.abs(distX) >= Math.abs(distY)) mx = distX > 0 ? 1 : -1;
      else my = distY > 0 ? 1 : -1;
    } else {
      // Wander
      const r = Math.floor(Math.random() * 4);
      if (r === 0) my = -1; else if (r === 1) my = 1;
      else if (r === 2) mx = -1; else mx = 1;
    }

    // Update facing
    if (my === -1) e.dir = 3; else if (my === 1) e.dir = 0;
    else if (mx === -1) e.dir = 1; else if (mx === 1) e.dir = 2;

    const nx = e.x + mx, ny = e.y + my;
    // Can move? Check bounds, solids, other enemies, NPCs, player
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !SOLID.has(currentMap().tiles[ny][nx])) {
      const blocked = enemies.some(o => o !== e && o.alive && o.x === nx && o.y === ny) ||
                      currentMap().npcs.some(n => n.x === nx && n.y === ny);
      if (!blocked && !(nx === player.x && ny === player.y)) {
        e.x = nx; e.y = ny;
      }
    }

    // Attack player if adjacent
    if (dist === 1 && player.iFrames <= 0) {
      const dmg = Math.max(1, et.atk - Math.floor(player.level * 0.5));
      player.hp -= dmg;
      player.hurtTimer = 0.3;
      player.iFrames = 0.8;
      damageFloats.push({ x: player.x * TILE + 16, y: player.y * TILE, text: `-${dmg}`, color: '#e74c3c', timer: 0.8 });
      if (player.hp <= 0) {
        player.hp = player.maxHp;
        // Respawn in village
        currentMapId = 'village';
        player.x = 9; player.y = 9;
        player.fromX = 9; player.fromY = 9;
        player.moving = false;
        showMessage('You were defeated! Respawned in village.');
      }
    }
  }
}

function showMessage(text) {
  messageQueue.push(text);
}

function canMove(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
  if (SOLID.has(currentMap().tiles[y][x])) return false;
  for (const npc of currentMap().npcs) {
    if (npc.x === x && npc.y === y) return false;
  }
  const enemies = MAP_ENEMIES[currentMapId] || [];
  for (const e of enemies) {
    if (e.alive && e.x === x && e.y === y) return false;
  }
  return true;
}

function checkScreenTransition() {
  const map = currentMap();
  const exits = map.exits;
  if (!exits) return;

  // Check edges
  if (player.y === 0 && exits.north && (map.exitTiles.north || []).includes(player.x)) {
    startTransition(exits.north);
  } else if (player.y === ROWS - 1 && exits.south && (map.exitTiles.south || []).includes(player.x)) {
    startTransition(exits.south);
  } else if (player.x === COLS - 1 && exits.east && (map.exitTiles.east || []).includes(player.y)) {
    startTransition(exits.east);
  } else if (player.x === 0 && exits.west && (map.exitTiles.west || []).includes(player.y)) {
    startTransition(exits.west);
  }
}

function startTransition(target) {
  transitioning = true;
  transitionTarget = target;
  transitionAlpha = 0;
}

function updateTransition(dt) {
  transitionAlpha += dt * 3;
  if (transitionAlpha >= 1 && transitionTarget) {
    // Switch map at peak darkness
    currentMapId = transitionTarget.map;
    player.x = transitionTarget.spawnX;
    player.y = transitionTarget.spawnY;
    player.fromX = player.x;
    player.fromY = player.y;
    player.moving = false;
    player.moveT = 0;
    dialogueState = null;
    const dest = transitionTarget;
    transitionTarget = null; // clear so we only switch once
  }
  if (transitionAlpha >= 2) {
    transitioning = false;
    transitionAlpha = 0;
  }
}

// Update
function update(dt) {
  if (transitioning) { updateTransition(dt); return; }

  if (currentMessage) { messageTimer -= dt; if (messageTimer <= 0) currentMessage = null; }
  if (!currentMessage && messageQueue.length) { currentMessage = messageQueue.shift(); messageTimer = 2; }

  player.animTimer += dt;
  if (player.animTimer > 0.2) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }

  // Attack timer
  if (player.attacking) { player.attackTimer -= dt; if (player.attackTimer <= 0) player.attacking = false; }
  if (player.attackCooldown > 0) player.attackCooldown -= dt;
  if (player.hurtTimer > 0) player.hurtTimer -= dt;
  if (player.iFrames > 0) player.iFrames -= dt;

  // Damage floats
  for (let i = damageFloats.length - 1; i >= 0; i--) {
    damageFloats[i].timer -= dt;
    damageFloats[i].y -= dt * 40;
    if (damageFloats[i].timer <= 0) damageFloats.splice(i, 1);
  }

  // Enemy AI
  enemyAI(dt);

  if (dialogueState || inventoryOpen || tradeOpen) return;

  if (player.moving) {
    const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? player.runSpeed : player.speed;
    player.moveT += dt * spd;
    if (player.moveT >= 1) {
      player.moving = false;
      player.moveT = 0;
      tryPickupItem();
      checkScreenTransition();
    }
    return;
  }

  let dx = 0, dy = 0;
  for (let i = keyOrder.length - 1; i >= 0; i--) {
    const k = keyOrder[i];
    if (k === 'ArrowUp' || k === 'KeyW') { dy = -1; player.dir = 3; break; }
    if (k === 'ArrowDown' || k === 'KeyS') { dy = 1; player.dir = 0; break; }
    if (k === 'ArrowLeft' || k === 'KeyA') { dx = -1; player.dir = 1; break; }
    if (k === 'ArrowRight' || k === 'KeyD') { dx = 1; player.dir = 2; break; }
  }

  if ((dx || dy) && canMove(player.x + dx, player.y + dy)) {
    player.fromX = player.x;
    player.fromY = player.y;
    player.x += dx;
    player.y += dy;
    player.moving = true;
    player.moveT = 0;
  }
}

// Draw helpers
function lerp(a, b, t) { return a + (b - a) * t; }

function drawTile(x, y) {
  const t = currentMap().tiles[y][x];
  const px = x * TILE, py = y * TILE;

  // Base fill depends on tile
  if (t === 7) { // Sand
    ctx.fillStyle = (x + y) % 2 === 0 ? C.sand : C.sand2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    ctx.fillRect(px + (x*7 % 20), py + (y*11 % 20), 6, 2);
    return;
  }
  if (t === 8) { // Dungeon floor
    ctx.fillStyle = (x + y) % 2 === 0 ? C.dungeonFloor : C.dungeonFloor2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.strokeRect(px, py, TILE, TILE);
    return;
  }
  if (t === 10) { // Cave floor
    ctx.fillStyle = (x + y) % 2 === 0 ? C.caveFloor : C.caveFloor2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fillRect(px + (x*13 % 24), py + (y*7 % 24), 4, 3);
    return;
  }
  if (t === 11) { // Cave wall
    ctx.fillStyle = C.caveWall;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(px, py + TILE - 4, TILE, 4);
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(px + 2, py + 2, TILE - 4, 3);
    return;
  }
  if (t === 12) { // Stalagmite
    ctx.fillStyle = (x + y) % 2 === 0 ? C.caveFloor : C.caveFloor2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = C.stalac;
    ctx.beginPath();
    ctx.moveTo(px + 8, py + TILE);
    ctx.lineTo(px + 16, py + 4);
    ctx.lineTo(px + 24, py + TILE);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.moveTo(px + 13, py + TILE - 4);
    ctx.lineTo(px + 16, py + 6);
    ctx.lineTo(px + 18, py + TILE - 4);
    ctx.fill();
    return;
  }
  if (t === 13) { // Dungeon wall
    ctx.fillStyle = C.dungeonWall;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(px, py + TILE - 4, TILE, 4);
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.strokeRect(px + 2, py + 2, TILE - 4, TILE - 4);
    return;
  }
  if (t === 14) { // Bones
    ctx.fillStyle = (x + y) % 2 === 0 ? C.sand : C.sand2;
    if (currentMapId === 'dungeon') ctx.fillStyle = (x + y) % 2 === 0 ? C.dungeonFloor : C.dungeonFloor2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = C.bones;
    ctx.fillRect(px + 6, py + 12, 18, 3);
    ctx.fillRect(px + 10, py + 8, 3, 14);
    ctx.fillRect(px + 18, py + 10, 3, 10);
    // Skull
    ctx.beginPath();
    ctx.arc(px + 14, py + 10, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = currentMapId === 'dungeon' ? C.dungeonFloor : C.sand;
    ctx.fillRect(px + 12, py + 9, 2, 2);
    ctx.fillRect(px + 15, py + 9, 2, 2);
    return;
  }
  if (t === 15) { // Crystal
    const bg = currentMapId === 'caves' ? ((x+y)%2===0 ? C.caveFloor : C.caveFloor2) : ((x+y)%2===0 ? C.dungeonFloor : C.dungeonFloor2);
    ctx.fillStyle = bg;
    ctx.fillRect(px, py, TILE, TILE);
    const glow = Math.sin(Date.now() / 500 + x + y) * 0.3 + 0.5;
    ctx.fillStyle = C.crystal;
    ctx.globalAlpha = glow + 0.4;
    ctx.beginPath();
    ctx.moveTo(px + 10, py + TILE);
    ctx.lineTo(px + 14, py + 4);
    ctx.lineTo(px + 18, py + TILE);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(px + 16, py + TILE);
    ctx.lineTo(px + 20, py + 8);
    ctx.lineTo(px + 24, py + TILE);
    ctx.fill();
    ctx.globalAlpha = glow * 0.3;
    ctx.fillStyle = C.crystalGlow;
    ctx.beginPath();
    ctx.arc(px + 16, py + 12, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    return;
  }
  if (t === 16) { // Mushroom (walkable)
    const bg = currentMapId === 'caves' ? ((x+y)%2===0 ? C.caveFloor : C.caveFloor2) : ((x+y)%2===0 ? C.caveFloor : C.caveFloor2);
    ctx.fillStyle = bg;
    ctx.fillRect(px, py, TILE, TILE);
    const pulse = Math.sin(Date.now() / 800 + x * 2) * 0.2 + 0.8;
    ctx.globalAlpha = pulse;
    // Stem
    ctx.fillStyle = '#d0c8b0';
    ctx.fillRect(px + 14, py + 16, 4, 12);
    ctx.fillRect(px + 6, py + 20, 4, 8);
    // Caps
    ctx.fillStyle = C.mushroomCap;
    ctx.beginPath(); ctx.arc(px + 16, py + 15, 7, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 8, py + 19, 5, Math.PI, 0); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(px + 13, py + 11, 2, 2);
    ctx.fillRect(px + 17, py + 12, 2, 2);
    ctx.globalAlpha = 1;
    return;
  }
  if (t === 17) { // Dark tree
    ctx.fillStyle = (x + y) % 2 === 0 ? C.caveFloor : C.caveFloor2;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = C.darkTrunk;
    ctx.fillRect(px + 12, py + 18, 8, 14);
    ctx.fillStyle = C.darkTree;
    ctx.beginPath();
    ctx.arc(px + 16, py + 14, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.arc(px + 18, py + 16, 6, 0, Math.PI * 2);
    ctx.fill();
    return;
  }
  if (t === 18) { // Torch wall
    ctx.fillStyle = currentMapId === 'dungeon' ? C.dungeonWall : C.wall;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(px, py + TILE - 4, TILE, 4);
    // Torch
    const flicker = Math.sin(Date.now() / 100 + x) * 2;
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(px + 14, py + 10, 4, 12);
    ctx.fillStyle = C.torch;
    ctx.beginPath();
    ctx.arc(px + 16, py + 8 + flicker * 0.3, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffe080';
    ctx.beginPath();
    ctx.arc(px + 16, py + 7 + flicker * 0.3, 3, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.globalAlpha = 0.08 + Math.sin(Date.now() / 150) * 0.03;
    ctx.fillStyle = '#ff8020';
    ctx.beginPath();
    ctx.arc(px + 16, py + 10, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    return;
  }
  if (t === 9) { // Lava
    ctx.fillStyle = C.lava;
    ctx.fillRect(px, py, TILE, TILE);
    const pulse = Math.sin(Date.now() / 300 + x + y * 2) * 0.3 + 0.7;
    ctx.globalAlpha = pulse * 0.4;
    ctx.fillStyle = C.lavaGlow;
    ctx.fillRect(px + 4, py + 4, TILE - 8, TILE - 8);
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = 'rgba(255,200,50,0.3)';
    ctx.fillRect(px + ((Date.now()/400 + x*5) % TILE), py + 8, 8, 3);
    ctx.globalAlpha = 1;
    return;
  }

  // Default grass-based tiles (0, 1, 2, 3, 4, 5, 6)
  ctx.fillStyle = (x + y) % 2 === 0 ? C.grass : C.grass2;
  ctx.fillRect(px, py, TILE, TILE);

  if (t === 1) {
    ctx.fillStyle = C.wall;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(px, py + TILE - 4, TILE, 4);
  } else if (t === 2) {
    ctx.fillStyle = C.water;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(px + ((Date.now()/500 + x*3) % TILE), py + 8, 6, 2);
    ctx.fillRect(px + ((Date.now()/700 + y*5) % TILE), py + 20, 4, 2);
  } else if (t === 3) {
    ctx.fillStyle = C.path;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(px + 4, py + 4, 4, 4);
    ctx.fillRect(px + 20, py + 16, 5, 3);
  } else if (t === 4) {
    ctx.fillStyle = C.trunk;
    ctx.fillRect(px + 12, py + 18, 8, 14);
    ctx.fillStyle = C.tree;
    ctx.beginPath();
    ctx.arc(px + 16, py + 14, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.arc(px + 13, py + 10, 5, 0, Math.PI * 2);
    ctx.fill();
  } else if (t === 5) {
    ctx.fillStyle = C.path;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = C.door;
    ctx.fillRect(px + 4, py, TILE - 8, TILE);
    ctx.fillStyle = '#c4a040';
    ctx.fillRect(px + 20, py + 14, 4, 4);
  } else if (t === 6) {
    ctx.fillStyle = C.roof;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(px, py + TILE - 3, TILE, 3);
  }
}

function drawCharacter(x, y, color, dir, frame) {
  const px = x * TILE, py = y * TILE;
  ctx.fillStyle = C.shadow;
  ctx.beginPath();
  ctx.ellipse(px + 16, py + 30, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  const bob = Math.sin(frame * Math.PI * 0.5) * 1.5;
  ctx.fillStyle = color;
  ctx.fillRect(px + 8, py + 10 + bob, 16, 16);
  ctx.fillStyle = '#f5d5a0';
  ctx.fillRect(px + 10, py + 2 + bob, 12, 12);
  ctx.fillStyle = '#333';
  if (dir === 0) {
    ctx.fillRect(px + 12, py + 8 + bob, 3, 3);
    ctx.fillRect(px + 18, py + 8 + bob, 3, 3);
  } else if (dir === 3) {
    ctx.fillStyle = '#c4a060';
    ctx.fillRect(px + 11, py + 3 + bob, 10, 6);
  } else if (dir === 1) {
    ctx.fillRect(px + 10, py + 8 + bob, 3, 3);
  } else {
    ctx.fillRect(px + 19, py + 8 + bob, 3, 3);
  }
  ctx.fillStyle = '#5a4a3a';
  ctx.fillRect(px + 10, py + 26 + bob, 5, 6);
  ctx.fillRect(px + 17, py + 26 + bob, 5, 6);
}

function drawPlayer() {
  // Hurt flash - blink when iframes active
  if (player.iFrames > 0 && Math.floor(player.iFrames * 10) % 2 === 0) return;

  let dx, dy;
  if (player.moving) {
    dx = lerp(player.fromX, player.x, player.moveT);
    dy = lerp(player.fromY, player.y, player.moveT);
  } else { dx = player.x; dy = player.y; }

  if (player.hurtTimer > 0) ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 30) * 0.3;
  drawCharacter(dx, dy, player.hurtTimer > 0 ? '#ff6666' : C.player, player.dir, player.moving ? player.animFrame : 0);
  ctx.globalAlpha = 1;

  // Draw attack slash
  if (player.attacking) {
    let sx = dx, sy = dy;
    if (player.dir === 0) sy += 1;
    else if (player.dir === 3) sy -= 1;
    else if (player.dir === 1) sx -= 1;
    else sx += 1;
    const progress = 1 - (player.attackTimer / 0.2);
    const spx = sx * TILE + 16, spy = sy * TILE + 16;
    ctx.globalAlpha = 1 - progress;
    ctx.strokeStyle = player.equippedWeapon ? ITEMS[player.equippedWeapon].color : '#fff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    const angle = progress * Math.PI;
    ctx.arc(spx, spy, 14 + progress * 4, angle - 1, angle + 1);
    ctx.stroke();
    // weapon color glow
    ctx.globalAlpha = (1 - progress) * 0.3;
    ctx.fillStyle = player.equippedWeapon ? ITEMS[player.equippedWeapon].color : '#fff';
    ctx.beginPath();
    ctx.arc(spx, spy, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawEnemies() {
  const enemies = MAP_ENEMIES[currentMapId] || [];
  for (const e of enemies) {
    if (!e.alive) continue;
    const et = ENEMY_TYPES[e.type];
    const px = e.x * TILE, py = e.y * TILE;

    // Shadow
    ctx.fillStyle = C.shadow;
    ctx.beginPath();
    ctx.ellipse(px + 16, py + 30, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body - different shapes per type
    const hurt = e.hurtTimer > 0;
    ctx.fillStyle = hurt ? '#fff' : et.color;

    if (e.type === 'slime') {
      const squish = Math.sin(Date.now() / 300 + e.x) * 2;
      ctx.beginPath();
      ctx.ellipse(px + 16, py + 22 + squish * 0.5, 12, 10 - squish * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.fillRect(px + 11, py + 19, 3, 3);
      ctx.fillRect(px + 18, py + 19, 3, 3);
    } else if (e.type === 'bat') {
      const flap = Math.sin(Date.now() / 100) * 4;
      ctx.beginPath();
      ctx.moveTo(px + 16, py + 16);
      ctx.lineTo(px + 2, py + 12 + flap);
      ctx.lineTo(px + 8, py + 22);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(px + 16, py + 16);
      ctx.lineTo(px + 30, py + 12 + flap);
      ctx.lineTo(px + 24, py + 22);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + 16, py + 18, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(px + 13, py + 16, 2, 2);
      ctx.fillRect(px + 18, py + 16, 2, 2);
    } else if (e.type === 'skeleton') {
      // Skull
      ctx.beginPath();
      ctx.arc(px + 16, py + 10, 7, 0, Math.PI * 2);
      ctx.fill();
      // Body
      ctx.fillRect(px + 13, py + 17, 6, 10);
      // Arms
      ctx.fillRect(px + 7, py + 18, 6, 3);
      ctx.fillRect(px + 19, py + 18, 6, 3);
      // Legs
      ctx.fillRect(px + 11, py + 27, 4, 5);
      ctx.fillRect(px + 17, py + 27, 4, 5);
      // Eyes
      ctx.fillStyle = '#333';
      ctx.fillRect(px + 13, py + 8, 3, 3);
      ctx.fillRect(px + 17, py + 8, 3, 3);
    } else if (e.type === 'scorpion') {
      ctx.beginPath();
      ctx.ellipse(px + 16, py + 24, 10, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail
      ctx.lineWidth = 2;
      ctx.strokeStyle = hurt ? '#fff' : et.color;
      ctx.beginPath();
      ctx.moveTo(px + 16, py + 18);
      ctx.quadraticCurveTo(px + 20, py + 6, px + 24, py + 10);
      ctx.stroke();
      // Stinger
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.arc(px + 24, py + 10, 2, 0, Math.PI * 2); ctx.fill();
      // Pincers
      ctx.fillStyle = hurt ? '#fff' : et.color;
      ctx.fillRect(px + 4, py + 20, 5, 3);
      ctx.fillRect(px + 23, py + 20, 5, 3);
    } else if (e.type === 'shade') {
      ctx.globalAlpha = 0.7 + Math.sin(Date.now() / 200) * 0.15;
      ctx.beginPath();
      ctx.moveTo(px + 16, py + 4);
      ctx.lineTo(px + 28, py + 20);
      ctx.quadraticCurveTo(px + 24, py + 32, px + 16, py + 30);
      ctx.quadraticCurveTo(px + 8, py + 32, px + 4, py + 20);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#a060ff';
      ctx.fillRect(px + 11, py + 14, 3, 4);
      ctx.fillRect(px + 18, py + 14, 3, 4);
      ctx.globalAlpha = 1;
    } else if (e.type === 'spider') {
      ctx.beginPath();
      ctx.arc(px + 16, py + 20, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = hurt ? '#fff' : et.color;
      // Legs
      for (let leg = 0; leg < 4; leg++) {
        const ox = leg < 2 ? -1 : 1;
        const oy = leg % 2 === 0 ? -4 : 4;
        ctx.beginPath();
        ctx.moveTo(px + 16 + ox * 7, py + 20 + oy);
        ctx.lineTo(px + 16 + ox * 15, py + 14 + oy + leg * 2);
        ctx.stroke();
      }
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(px + 12, py + 17, 3, 3);
      ctx.fillRect(px + 18, py + 17, 3, 3);
    }

    // HP bar
    if (e.hp < e.maxHp) {
      ctx.fillStyle = '#333';
      ctx.fillRect(px + 4, py - 4, 24, 4);
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(px + 4, py - 4, 24 * (e.hp / e.maxHp), 4);
    }

    // Name
    ctx.fillStyle = '#ff9999';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(et.name, px + 16, py - 6);
  }
}

function drawDamageFloats() {
  for (const f of damageFloats) {
    ctx.globalAlpha = Math.min(1, f.timer * 2);
    ctx.fillStyle = f.color;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function drawNPCs() {
  for (const npc of currentMap().npcs) {
    drawCharacter(npc.x, npc.y, npc.color, npc.dir, 0);
    ctx.fillStyle = C.white;
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(npc.name, npc.x * TILE + 16, npc.y * TILE - 2);
  }
}

function drawUI() {
  const pad = 8, barW = 120, barH = 10;

  ctx.fillStyle = 'rgba(20,20,40,0.85)';
  ctx.fillRect(pad, pad, 160, 80);
  ctx.strokeStyle = C.uiBorder;
  ctx.lineWidth = 1;
  ctx.strokeRect(pad, pad, 160, 80);

  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = C.white;
  ctx.fillText(`${player.name}  Lv.${player.level}`, pad + 8, pad + 16);

  ctx.fillStyle = C.hpBg;
  ctx.fillRect(pad + 8, pad + 24, barW, barH);
  ctx.fillStyle = C.hpFill;
  ctx.fillRect(pad + 8, pad + 24, barW * (player.hp / player.maxHp), barH);
  ctx.fillStyle = C.white; ctx.font = '9px monospace';
  ctx.fillText(`HP ${player.hp}/${player.maxHp}`, pad + 10, pad + 32);

  ctx.fillStyle = C.hpBg;
  ctx.fillRect(pad + 8, pad + 38, barW, barH);
  ctx.fillStyle = C.mpFill;
  ctx.fillRect(pad + 8, pad + 38, barW * (player.mp / player.maxMp), barH);
  ctx.fillStyle = C.white;
  ctx.fillText(`MP ${player.mp}/${player.maxMp}`, pad + 10, pad + 46);

  ctx.fillStyle = C.hpBg;
  ctx.fillRect(pad + 8, pad + 52, barW, barH);
  ctx.fillStyle = C.xpFill;
  ctx.fillRect(pad + 8, pad + 52, barW * (player.xp / player.maxXp), barH);
  ctx.fillStyle = C.white;
  ctx.fillText(`XP ${player.xp}/${player.maxXp}`, pad + 10, pad + 60);

  // ATK + weapon
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '9px monospace';
  const weaponName = player.equippedWeapon ? ITEMS[player.equippedWeapon].name : 'Fists';
  ctx.fillText(`ATK: ${getPlayerAtk()}  [${weaponName}]`, pad + 8, pad + 74);

  // Area name
  ctx.font = 'bold 12px monospace';
  const areaName = currentMap().name;
  const nameW = ctx.measureText(areaName).width + 20;
  ctx.fillStyle = 'rgba(20,20,40,0.7)';
  ctx.fillRect(canvas.width - nameW - pad, pad, nameW, 22);
  ctx.strokeStyle = C.uiBorder;
  ctx.strokeRect(canvas.width - nameW - pad, pad, nameW, 22);
  ctx.fillStyle = C.uiBorder;
  ctx.textAlign = 'right';
  ctx.fillText(areaName, canvas.width - pad - 8, pad + 15);

  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('WASD: Move  Shift: Run  E: Attack  Space: Talk  I: Inventory', canvas.width - pad, canvas.height - pad);
}

function drawDialogue() {
  if (!dialogueState) return;
  const npc = dialogueState.npc;
  const text = npc.dialogue[dialogueState.line];
  const boxH = 80, boxY = canvas.height - boxH - 8;

  ctx.fillStyle = 'rgba(20,20,40,0.92)';
  ctx.fillRect(8, boxY, canvas.width - 16, boxH);
  ctx.strokeStyle = C.uiBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(8, boxY, canvas.width - 16, boxH);

  ctx.fillStyle = C.uiBorder;
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(npc.name, 20, boxY + 20);

  ctx.fillStyle = C.white;
  ctx.font = '12px monospace';
  const words = text.split(' ');
  let line = '', lineY = boxY + 40;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > canvas.width - 48) {
      ctx.fillText(line, 20, lineY); line = word + ' '; lineY += 16;
    } else { line = test; }
  }
  ctx.fillText(line, 20, lineY);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  const prompt = dialogueState.line < npc.dialogue.length - 1 ? '[Space] Continue' : '[Space] Close';
  ctx.fillText(prompt, canvas.width - 20, boxY + boxH - 8);
}

function drawItemIcon(px, py, itemId, size) {
  const item = ITEMS[itemId];
  if (!item) return;
  const s = size || 16;
  const cx = px + s/2, cy = py + s/2;
  ctx.fillStyle = item.color;
  if (item.icon === 'herb') {
    ctx.fillRect(px + s*0.4, py + s*0.3, s*0.15, s*0.5);
    ctx.beginPath(); ctx.arc(cx - s*0.1, py + s*0.3, s*0.25, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + s*0.15, py + s*0.4, s*0.18, 0, Math.PI*2); ctx.fill();
  } else if (item.icon === 'shroom') {
    ctx.fillStyle = '#d0c8b0';
    ctx.fillRect(cx - 1, cy, 3, s*0.35);
    ctx.fillStyle = item.color;
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, Math.PI, 0); ctx.fill();
  } else if (item.icon === 'fossil') {
    ctx.beginPath(); ctx.arc(cx, cy, s*0.35, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.2, 0, Math.PI*1.5); ctx.stroke();
  } else if (item.icon === 'gem') {
    ctx.beginPath();
    ctx.moveTo(cx, py + s*0.15); ctx.lineTo(px + s*0.8, cy);
    ctx.lineTo(cx, py + s*0.85); ctx.lineTo(px + s*0.2, cy);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.moveTo(cx, py + s*0.2); ctx.lineTo(px + s*0.6, cy - s*0.05); ctx.lineTo(cx, cy); ctx.fill();
  } else if (item.icon === 'crystal') {
    ctx.beginPath();
    ctx.moveTo(cx - s*0.15, py + s*0.8); ctx.lineTo(cx, py + s*0.1); ctx.lineTo(cx + s*0.15, py + s*0.8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(cx - 1, py + s*0.2, 2, s*0.3);
  } else if (item.icon === 'potion') {
    ctx.fillRect(cx - s*0.1, py + s*0.15, s*0.2, s*0.2);
    ctx.beginPath(); ctx.arc(cx, py + s*0.6, s*0.25, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(cx - s*0.08, py + s*0.52, s*0.08, 0, Math.PI*2); ctx.fill();
  } else if (item.icon === 'scroll') {
    ctx.fillRect(px + s*0.2, py + s*0.2, s*0.6, s*0.6);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(px + s*0.3, py + s*0.3, s*0.4, 2);
    ctx.fillRect(px + s*0.3, py + s*0.45, s*0.35, 2);
    ctx.fillRect(px + s*0.3, py + s*0.6, s*0.25, 2);
  } else if (item.icon === 'feather') {
    ctx.beginPath();
    ctx.moveTo(cx, py + s*0.1); ctx.quadraticCurveTo(px + s*0.8, cy, cx, py + s*0.9);
    ctx.quadraticCurveTo(px + s*0.4, cy, cx, py + s*0.1);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(cx - 0.5, py + s*0.15, 1, s*0.7);
  } else if (item.icon === 'coin') {
    ctx.beginPath(); ctx.arc(cx, cy, s*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.2, 0, Math.PI*2); ctx.stroke();
  } else if (item.icon === 'sword') {
    ctx.fillStyle = '#888';
    ctx.fillRect(cx - 1, py + s*0.1, 3, s*0.55);
    ctx.fillStyle = item.color;
    ctx.fillRect(cx - 4, py + s*0.55, 9, 3);
    ctx.fillStyle = '#a08050';
    ctx.fillRect(cx - 1.5, py + s*0.6, 4, s*0.3);
  } else if (item.icon === 'staff') {
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(cx - 1.5, py + s*0.15, 3, s*0.75);
    ctx.fillStyle = item.color;
    ctx.beginPath(); ctx.arc(cx, py + s*0.18, s*0.18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(cx - 1, py + s*0.15, s*0.08, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillRect(px + 2, py + 2, s - 4, s - 4);
  }
}

function drawGroundItems() {
  const items = MAP_ITEMS[currentMapId];
  if (!items) return;
  for (const gi of items) {
    const px = gi.x * TILE + 8, py = gi.y * TILE + 8;
    // Bobbing animation
    const bob = Math.sin(Date.now() / 400 + gi.x * 3 + gi.y * 7) * 3;
    // Glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = ITEMS[gi.item].color;
    ctx.beginPath();
    ctx.arc(px + 8, py + 8 + bob, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Icon
    drawItemIcon(px, py + bob, gi.item, 16);
  }
}

function drawInventory() {
  if (!inventoryOpen) return;
  const pad = 16;
  const w = 280, h = 300;
  const ox = (canvas.width - w) / 2, oy = (canvas.height - h) / 2;

  // Background
  ctx.fillStyle = 'rgba(15,15,30,0.94)';
  ctx.fillRect(ox, oy, w, h);
  ctx.strokeStyle = C.uiBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(ox, oy, w, h);

  // Title
  ctx.fillStyle = C.uiBorder;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('INVENTORY', ox + w/2, oy + 22);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.moveTo(ox + 10, oy + 30); ctx.lineTo(ox + w - 10, oy + 30); ctx.stroke();

  const inv = getInventoryDisplay();
  if (inv.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '12px monospace';
    ctx.fillText('Empty - explore to find items!', ox + w/2, oy + 80);
  } else {
    const startY = oy + 44;
    const rowH = 28;
    const maxVisible = Math.floor((h - 70) / rowH);
    const scrollOffset = Math.max(0, inventoryCursor - maxVisible + 1);

    for (let i = 0; i < Math.min(inv.length, maxVisible); i++) {
      const idx = i + scrollOffset;
      if (idx >= inv.length) break;
      const entry = inv[idx];
      const ry = startY + i * rowH;

      // Selection highlight
      if (idx === inventoryCursor) {
        ctx.fillStyle = 'rgba(232,193,112,0.15)';
        ctx.fillRect(ox + 6, ry - 4, w - 12, rowH - 2);
        ctx.strokeStyle = C.uiBorder;
        ctx.lineWidth = 1;
        ctx.strokeRect(ox + 6, ry - 4, w - 12, rowH - 2);
      }

      // Item icon
      drawItemIcon(ox + 14, ry - 1, entry.id, 18);

      // Name + qty
      ctx.fillStyle = C.white;
      ctx.font = '12px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`${entry.item.name}`, ox + 38, ry + 12);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.textAlign = 'right';
      ctx.fillText(`x${entry.qty}`, ox + w - 14, ry + 12);
    }

    // Description for selected
    if (inv[inventoryCursor]) {
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(ox + 6, oy + h - 40, w - 12, 30);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(inv[inventoryCursor].item.desc, ox + w/2, oy + h - 20);
    }
  }

  // Controls hint
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[I] Close  [W/S] Navigate  [Space] Equip/Use', ox + w/2, oy + h - 4);
}

function drawTradeMenu() {
  if (!tradeOpen || !tradeNpc) return;
  const pad = 16;
  const w = 340, h = 260;
  const ox = (canvas.width - w) / 2, oy = (canvas.height - h) / 2;

  // Background
  ctx.fillStyle = 'rgba(15,15,30,0.94)';
  ctx.fillRect(ox, oy, w, h);
  ctx.strokeStyle = C.uiBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(ox, oy, w, h);

  // Title
  ctx.fillStyle = C.uiBorder;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${tradeNpc.name}'s Trades`, ox + w/2, oy + 22);

  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.moveTo(ox + 10, oy + 30); ctx.lineTo(ox + w - 10, oy + 30); ctx.stroke();

  const trades = tradeNpc.trades;
  const startY = oy + 46;
  const rowH = 32;

  for (let i = 0; i < trades.length; i++) {
    const t = trades[i];
    const ry = startY + i * rowH;
    const hasEnough = countItem(t.give) >= t.giveQty;

    // Selection highlight
    if (i === tradeCursor) {
      ctx.fillStyle = 'rgba(232,193,112,0.15)';
      ctx.fillRect(ox + 6, ry - 4, w - 12, rowH - 2);
      ctx.strokeStyle = C.uiBorder;
      ctx.lineWidth = 1;
      ctx.strokeRect(ox + 6, ry - 4, w - 12, rowH - 2);
    }

    // Give icon
    drawItemIcon(ox + 14, ry, t.give, 16);
    // Arrow
    ctx.fillStyle = hasEnough ? '#5cb85c' : '#cc5555';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`${t.giveQty}x`, ox + 34, ry + 12);

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('-->', ox + w/2 - 20, ry + 12);

    // Receive icon
    drawItemIcon(ox + w/2 + 14, ry, t.receive, 16);
    ctx.fillStyle = C.white;
    ctx.fillText(`${t.receiveQty}x`, ox + w/2 + 34, ry + 12);

    // Stock info
    ctx.fillStyle = hasEnough ? 'rgba(92,184,92,0.7)' : 'rgba(200,80,80,0.5)';
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`(have ${countItem(t.give)})`, ox + w - 14, ry + 12);
  }

  // Controls
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[W/S] Navigate  [Space] Trade  [Esc] Close', ox + w/2, oy + h - 10);
}

function drawTransition() {
  if (!transitioning) return;
  // Fade to black then back
  const alpha = transitionAlpha <= 1 ? transitionAlpha : 2 - transitionAlpha;
  ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// Main loop
let lastTime = 0;
function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  update(dt);

  const map = currentMap();
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) drawTile(x, y);
  }

  // Draw ground items
  drawGroundItems();

  // Draw entities sorted by Y (player, NPCs, enemies)
  const entities = [];
  map.npcs.forEach(n => entities.push({ type: 'npc', y: n.y, draw: () => {
    drawCharacter(n.x, n.y, n.color, n.dir, 0);
    ctx.fillStyle = C.white; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(n.name, n.x * TILE + 16, n.y * TILE - 2);
  }}));
  const enemies = MAP_ENEMIES[currentMapId] || [];
  enemies.forEach(e => { if (e.alive) entities.push({ type: 'enemy', y: e.y, data: e }); });
  const py = player.moving ? lerp(player.fromY, player.y, player.moveT) : player.y;
  entities.push({ type: 'player', y: py });
  entities.sort((a, b) => a.y - b.y);
  for (const e of entities) {
    if (e.type === 'player') drawPlayer();
    else if (e.type === 'npc') e.draw();
    else if (e.type === 'enemy') drawEnemies(); // draws all but Y-sort handles overlap
  }

  // Redraw tree-type tiles on top for depth
  const treeTiles = new Set([4, 17]);
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (treeTiles.has(map.tiles[y][x])) drawTile(x, y);
    }
  }

  drawDamageFloats();
  drawUI();
  drawDialogue();
  drawInventory();
  drawTradeMenu();
  drawTransition();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
