<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village of Ashenveil</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1208; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { image-rendering: pixelated; border: 2px solid #5a4520; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script src="../rpg-engine.js"></script>
<script>

const gameConfig = {
  title: 'Village of Ashenveil',

  colors: {
    grass:  '#5a8a45', grass2: '#4d7a3b',
    path:   '#c0a050',
    cobble: '#9a9080',
    water:  '#4a7ab0',
    wall:   '#7a6855',
    roof:   '#8a3825',
    door:   '#5a3a1a',
    tree:   '#2d5a1e',
    trunk:  '#6b4226',
    fence:  '#b89a6a',
    player: '#e8c170',
    shadow: 'rgba(0,0,0,0.2)',
    uiBorder: '#e8c170',
    hpFill: '#e74c3c', hpBg: '#555',
    mpFill: '#3498db', xpFill: '#f1c40f', white: '#fff',
  },

  solidTiles: [1, 2, 4, 6, 25],
  treeTiles: [4],

  player: { name: 'Stranger', x: 9, y: 7, hp: 30, mp: 10, atk: 3 },
  combat: { dash: true, gun: false },
  startMap: 'ashenveil',

  items: {
    herb:       { name: 'Healing Herb',    color: '#5cb85c', icon: 'herb',   desc: 'Restores 8 HP.',  heal: 8 },
    potion:     { name: 'Healing Draught', color: '#e74c3c', icon: 'potion', desc: 'Restores 20 HP.', heal: 20 },
    coin:       { name: 'Gold Coin',       color: '#f1c40f', icon: 'coin',   desc: 'Currency of the realm.' },
    bread:      { name: 'Bread',           color: '#d4a574', icon: 'fossil', desc: 'Restores 5 HP.',  heal: 5 },
    royal_note: { name: 'Royal Note',      color: '#f0e0a0', icon: 'scroll', desc: 'A sealed note bearing the late King\'s crest. Handle with extreme care.' },
  },

  enemyTypes: {},

  doorPortals: {
    ashenveil: [
      { x: 0, y: 7, map: 'noble_quarter', spawnX: 14, spawnY: 7, locked: false },
    ],
    noble_quarter: [
      { x: 16, y: 7, map: 'ashenveil', spawnX: 1, spawnY: 7, locked: false },
    ],
  },

  drawTile(ctx, type, x, y, px, py, T, C) {
    switch (type) {
      case 0: { // grass
        ctx.fillStyle = (x+y)%2 ? (C.grass||'#5a8a45') : (C.grass2||'#4d7a3b');
        ctx.fillRect(px, py, T, T);
        if ((x*7+y*13)%11 < 3) {
          ctx.fillStyle = C.grass2||'#4d7a3b';
          ctx.fillRect(px+8,py+22,2,5); ctx.fillRect(px+14,py+20,2,6); ctx.fillRect(px+20,py+23,2,4);
        }
        break;
      }
      case 1: { // stone wall
        ctx.fillStyle = C.wall||'#7a6855'; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(px, py+T-4, T, 4);
        ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
        ctx.strokeRect(px+1, py+1, T/2-1, T/2-1);
        ctx.strokeRect(px+T/2, py+T/2, T/2-1, T/2-1);
        break;
      }
      case 3: { // dirt spur path
        ctx.fillStyle = C.path||'#c0a050'; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = 'rgba(0,0,0,0.06)';
        if ((x+y*3)%5===0) ctx.fillRect(px+6,py+10,4,3);
        if ((x*2+y)%7===0) ctx.fillRect(px+16,py+20,5,3);
        break;
      }
      case 4: { // tree
        ctx.fillStyle = (x+y)%2 ? (C.grass||'#5a8a45') : (C.grass2||'#4d7a3b');
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = C.trunk||'#6b4226'; ctx.fillRect(px+13, py+18, 6, 14);
        ctx.fillStyle = C.tree||'#2d5a1e';
        ctx.beginPath(); ctx.arc(px+16, py+12, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(0,50,0,0.25)';
        ctx.beginPath(); ctx.arc(px+13, py+10, 7, 0, Math.PI*2); ctx.fill();
        break;
      }
      case 5: { // door
        ctx.fillStyle = C.path||'#c0a050'; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = C.door||'#5a3a1a'; ctx.fillRect(px+4, py+2, 24, 28);
        ctx.fillStyle = C.uiBorder||'#e8c170'; ctx.fillRect(px+20, py+14, 4, 4);
        ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(px+4, py+2, 24, 3);
        break;
      }
      case 6: { // roof
        let rc;
        if (x <= 5)       rc = (y < 7) ? '#8b3028' : '#7a4025';
        else if (x <= 12) rc = (y < 7) ? '#3a506a' : '#2a585a';
        else              rc = (y < 7) ? '#3a5a28' : '#4a3855';
        ctx.fillStyle = rc; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        for (let i = 0; i < T; i += 8) ctx.fillRect(px, py+i, T, 1);
        ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(px+2, py+2, T-4, 2);
        break;
      }
      case 18: { // flower patch
        ctx.fillStyle = (x+y)%2 ? (C.grass||'#5a8a45') : (C.grass2||'#4d7a3b');
        ctx.fillRect(px, py, T, T);
        const fc = ['#e55','#e8e','#ee5','#5be','#f90'];
        for (let i = 0; i < 4; i++) {
          const fx = px+6+((x*7+i*11)%20), fy = py+6+((y*5+i*13)%20);
          ctx.fillStyle = fc[(x+y+i)%fc.length];
          ctx.beginPath(); ctx.arc(fx, fy, 3, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#2d5a1e'; ctx.fillRect(fx-0.5, fy+3, 1.5, 4);
        }
        break;
      }
      case 21: { // cobblestone road
        ctx.fillStyle = C.cobble||'#9a9080'; ctx.fillRect(px, py, T, T);
        ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
        ctx.strokeRect(px+1, py+1, 14, 14); ctx.strokeRect(px+16, py+1, 14, 14);
        ctx.strokeRect(px+8, py+16, 14, 14);
        break;
      }
      case 25: { // marble fountain
        ctx.fillStyle = '#d4c5b0'; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#e8dcc8';
        ctx.beginPath(); ctx.arc(px+16, py+16, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#4a9fd8';
        ctx.beginPath(); ctx.arc(px+16, py+16, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#7db8e8';
        ctx.beginPath(); ctx.arc(px+16, py+10, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+10, py+18, 2.5, 0, Math.PI*2); ctx.fill();
        break;
      }
      default: {
        ctx.fillStyle = (x+y)%2 ? (C.grass||'#5a8a45') : (C.grass2||'#4d7a3b');
        ctx.fillRect(px, py, T, T);
      }
    }
  },

    ashenveil: {
      name: 'Village of Ashenveil',
      tiles: [
        [4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4],
        [4,0,1,1,1,1,0,4,1,1,1,1,0,4,1,1,1,1,0,4],
        [4,0,1,6,6,1,18,0,1,6,6,1,0,18,1,6,6,1,0,4],
        [4,18,1,6,6,1,0,0,1,6,6,1,0,0,1,6,6,1,18,4],
        [4,4,1,6,6,1,0,18,1,6,6,1,18,0,1,6,6,1,4,4],
        [4,0,1,5,5,1,0,0,1,5,5,1,0,0,1,5,5,1,0,4],
        [4,18,0,3,3,0,0,18,0,3,3,0,18,0,0,3,3,0,18,4],
        [5,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21],
        [4,18,0,0,0,0,3,0,18,0,0,18,3,0,0,0,0,0,18,4],
        [4,0,1,1,1,1,0,0,1,1,1,1,0,0,1,1,1,1,0,4],
        [4,0,1,6,6,1,18,0,1,6,6,1,0,18,1,6,6,1,0,4],
        [4,4,1,6,6,1,0,18,1,6,6,1,18,0,1,6,6,1,4,4],
        [4,0,1,5,5,1,0,0,1,5,5,1,0,0,1,5,5,1,0,4],
        [4,18,0,3,3,3,3,3,3,3,3,3,3,3,3,3,3,0,18,4],
        [4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4,4],
      ],
      npcs: [
        { x: 3, y: 6, name: 'Miriam', color: '#da8a7e', dir: 2,
          dialogue: [
            "Welcome to the Hearthfire Inn. Though there's little warmth left in this village now...",
            "Two nights past, soldiers in black rode through. Took my best rooms — didn't pay a copper.",
            "King Aldric visited here once, years ago. Remembered my daughter's name. A truly GOOD man.",
            "They say Lord Malachar poisoned him at the royal feast. Nobody dares speak it aloud.",
            "Keep your head down, stranger. These are the most dangerous times I've known in forty years.",
          ] },
        { x: 2, y: 6, name: 'Torin', color: '#7eb8da', dir: 1,
          dialogue: [
            "Village Guard Torin. My oath was to King Aldric and the realm — not to Malachar.",
            "I haven't said that loudly. But I'm saying it to you, stranger.",
            "Old Captain Hend rode north three nights ago. Said he knew where the young prince was hidden.",
            "If soldiers come asking what I saw... I was on patrol. Saw nothing. Understood?",
          ] },
        { x: 10, y: 6, name: 'Elder Theron', color: '#7eb8da', dir: 2,
          dialogue: [
            "I have served this village for forty years. I have never known fear like this.",
            "King Aldric is dead. Malachar has seized the capital. The council has been silenced.",
            "I light a single candle for the king each morning. It is all I am permitted to do. For now.",
            "There are whispers of an heir who escaped the night of the coup. If true... everything changes.",
            "Be careful what you say on the roads, stranger. Malachar's informants are everywhere.",
          ] },
        { x: 15, y: 6, name: 'Bram', color: '#dab87e', dir: 2,
          dialogue: [
            "Blacksmith Bram. I work iron and I speak plainly — no time for courtly games.",
            "I was in the capital the night the announcement was made. I watched the royal guard's faces. They KNEW.",
            "Malachar replaced the entire guard in a single night. Hundreds of loyal men — vanished.",
            "My hammer's been ringing day and night this week. Not making horseshoes, I'll tell you that.",
            "If you're heading to the capital — wait. Wait for the signal. You'll know it when it comes.",
          ] },
        { x: 16, y: 6, name: 'Sven', color: '#d4a040', dir: 1,
          dialogue: [
            "I'm Master Bram's apprentice. He won't say what he's forging these days.",
            "I can guess though. I'm sixteen — old enough to fight if it comes to that.",
            "My brother's in the city guard. I haven't gotten a letter in four weeks now.",
            "Do you think there'll be a real war? ...I want to be ready.",
          ] },
        { x: 5, y: 7, name: 'Finn', color: '#f0d040', dir: 0,
          dialogue: [
            "Did you see those soldiers on the east road?! Black armour — red plumes!",
            "My da says not to talk about the king. Says it gets people hurt or worse.",
            "I heard Malachar killed the whole royal council the same night. Is that true?",
            "I always wanted to be a soldier someday. Now... now I'm not so sure.",
          ] },
        { x: 12, y: 7, name: 'Mara', color: '#a0a8b8', dir: 3,
          dialogue: [
            "My husband was King Aldric's cartwright. He refused to work for Malachar's court.",
            "Three men in black iron came in the night. He was gone before dawn.",
            "Three weeks, and I've heard nothing. I pray at Sister Lysa's shrine every morning.",
            "If you ever reach the capital — ask about Aldric's Promise. There's a resistance forming.",
            "Just... remember his name for me. Edric, son of Brennan. Remember it.",
          ] },
        { x: 17, y: 7, name: 'Stranger', color: '#a0a8b8', dir: 2,
          dialogue: [
            "...",
            "I rode through the capital three nights ago. The king's banner flies no more.",
            "There's a gathering forming in the Ashwood, north of the valley. People who remember their oaths.",
            "The question is simple, friend — when it comes time to choose sides, which side will you be on?",
          ] },
        { x: 3, y: 13, name: 'Oskar', color: '#d47a5a', dir: 0, trader: true,
          trades: [
            { give: 'coin', giveQty: 1, receive: 'bread',  receiveQty: 2 },
            { give: 'coin', giveQty: 2, receive: 'herb',   receiveQty: 3 },
            { give: 'coin', giveQty: 3, receive: 'potion', receiveQty: 1 },
          ],
          dialogue: [
            "Oskar's General Goods. Keep your voice down — walls have ears these days.",
            "Trade has dried up since the... change. Road taxes are triple. Merchants fear the highway.",
            "My cousin in the capital says the palace gates are sealed iron-tight. Nobody in or out.",
            "I still have supplies if you need them. Fair prices. I can't afford making enemies right now.",
          ] },
        { x: 1, y: 13, name: 'Aldus', color: '#dab87e', dir: 0,
          dialogue: [
            "Six generations, my family has farmed this valley. SIX.",
            "First Malachar raised the grain tax. Now his men are measuring our fields.",
            "Quietly, now — some of us have been sending food north. To the old keep in the Ashwood.",
            "If the young prince is alive out there, he'll need allies and provisions. Remember that.",
          ] },
        { x: 9, y: 13, name: 'Helena', color: '#7eda9e', dir: 0, trader: true,
          trades: [
            { give: 'herb', giveQty: 3, receive: 'potion', receiveQty: 1 },
            { give: 'coin', giveQty: 1, receive: 'herb',   receiveQty: 2 },
          ],
          dialogue: [
            "Helena's Apothecary. Come — let me see if you're hurt.",
            "I've been making more wound salves than ever. People come from the city with injuries.",
            "A guard beat a man for speaking the king's name in a tavern. I treated his wounds for a week.",
            "Stock up on herbs while you can. The roads south are being watched and taxed.",
            "Take some remedies and be safe. Dark times need careful, healthy people.",
          ] },
        { x: 15, y: 13, name: 'Lysa', color: '#c87eb8', dir: 0,
          dialogue: [
            "Be welcome at the Shrine of the Old Gods, traveler. These are dark and sacred times.",
            "I light a candle for King Aldric every morning at dawn. The gods remember, even when men forget.",
            "More people come to pray now than in all my years tending this shrine. Fear drives the faithful.",
            "There is a shadow over this kingdom... but shadow is only the absence of light. The light endures.",
            "May the old gods watch your path, stranger. I sense you carry something important.",
          ] },
        { x: 17, y: 13, name: 'Elara', color: '#a0a8b8', dir: 0,
          dialogue: [
            "My son served in King Aldric's household guard. I haven't seen him since the night of the coup.",
            "Sister Lysa says the gods will restore justice in time. I have to believe that.",
            "Whatever you're doing out there, stranger... please. Bring the old kingdom back.",
          ] },
      ],
      items: [
        { x:  7, y:  2, item: 'royal_note' },
        { x: 13, y:  3, item: 'coin'       },
        { x:  5, y:  8, item: 'herb'       },
        { x: 11, y:  8, item: 'coin'       },
        { x:  7, y: 13, item: 'herb'       },
        { x: 13, y: 13, item: 'herb'       },
      ],
      enemies: [],
      exits: {},

    noble_quarter: {
