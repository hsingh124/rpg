  drawTile(ctx, type, x, y, px, py, T, C) {
    const seed = (x * 7 + y * 13) % 17;
    switch (type) {
      case 0: { // enchanted grass — deep blue-green with bioluminescent specks
        ctx.fillStyle = (x+y)%2 ? '#1e3a2a' : '#1a3326';
        ctx.fillRect(px, py, T, T);
        // Grass blades
        if (seed < 5) {
          ctx.fillStyle = '#2a4a35';
          ctx.fillRect(px+6,py+22,1.5,6); ctx.fillRect(px+14,py+20,1.5,7); ctx.fillRect(px+22,py+24,1.5,5);
        }
        // Glowing specks — the magic of the grove
        if (seed < 3) {
          ctx.fillStyle = 'rgba(120,180,255,0.3)';
          ctx.beginPath(); ctx.arc(px+8+seed*3, py+10+seed*2, 1.5, 0, Math.PI*2); ctx.fill();
        }
        if (seed > 13) {
          ctx.fillStyle = 'rgba(180,220,160,0.25)';
          ctx.beginPath(); ctx.arc(px+20-seed, py+22-seed, 1, 0, Math.PI*2); ctx.fill();
        }
        break;
      }
      case 2: { // moonlit lake — deep dark water with silver reflections
        ctx.fillStyle = '#0e2240';
        ctx.fillRect(px, py, T, T);
        // Ripples
        ctx.strokeStyle = 'rgba(100,150,220,0.15)';
        ctx.lineWidth = 0.5;
        const rx = px + 10 + (seed % 12);
        const ry = py + 8 + (seed % 16);
        ctx.beginPath(); ctx.arc(rx, ry, 4+seed%4, 0, Math.PI*2); ctx.stroke();
        // Moon reflection shimmer
        if ((x + y) % 5 === 0) {
          ctx.fillStyle = 'rgba(200,220,255,0.12)';
          ctx.fillRect(px+12, py+4, 3, 8);
          ctx.fillRect(px+10, py+8, 7, 2);
        }
        // Subtle depth variation
        ctx.fillStyle = 'rgba(0,10,40,0.15)';
        ctx.fillRect(px, py+T-4, T, 4);
        break;
      }
      case 4: { // ancient trees — massive, gnarled, with glowing moss
        ctx.fillStyle = (x+y)%2 ? '#1e3a2a' : '#1a3326';
        ctx.fillRect(px, py, T, T);
        // Thick gnarled trunk
        ctx.fillStyle = '#2a1e14';
        ctx.fillRect(px+11, py+16, 10, 16);
        // Root spread
        ctx.fillStyle = '#251a10';
        ctx.fillRect(px+7, py+28, 18, 4);
        // Dark canopy layers
        ctx.fillStyle = '#0a2a12';
        ctx.beginPath(); ctx.arc(px+16, py+10, 16, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#082a0e';
        ctx.beginPath(); ctx.arc(px+12, py+7, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#0e3316';
        ctx.beginPath(); ctx.arc(px+20, py+12, 9, 0, Math.PI*2); ctx.fill();
        // Glowing moss on trunk
        ctx.fillStyle = 'rgba(100,200,120,0.25)';
        ctx.fillRect(px+11, py+18, 3, 5);
        ctx.fillRect(px+18, py+20, 2, 4);
        break;
      }
      case 3: { // mossy path — ancient stepping stones through the grove
        ctx.fillStyle = '#1a3326';
        ctx.fillRect(px, py, T, T);
        // Worn stones
        ctx.fillStyle = '#3a3a30';
        ctx.beginPath(); ctx.arc(px+10, py+8, 5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+22, py+20, 6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+12, py+26, 4, 0, Math.PI*2); ctx.fill();
        // Moss on stones
        ctx.fillStyle = 'rgba(60,120,60,0.3)';
        ctx.beginPath(); ctx.arc(px+8, py+7, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(px+24, py+19, 3, 0, Math.PI*2); ctx.fill();
        break;
      }
      case 17: { // silver birch — pale ghostly trees unique to this grove
        ctx.fillStyle = (x+y)%2 ? '#1e3a2a' : '#1a3326';
        ctx.fillRect(px, py, T, T);
        // Pale silver trunk
        ctx.fillStyle = '#b0b8c0';
        ctx.fillRect(px+13, py+14, 6, 18);
        // Dark birch marks
        ctx.fillStyle = '#6a6a70';
        ctx.fillRect(px+14, py+16, 4, 1.5);
        ctx.fillRect(px+13, py+22, 5, 1);
        ctx.fillRect(px+15, py+27, 3, 1);
        // Silvery canopy
        ctx.fillStyle = '#1a3a2a';
        ctx.beginPath(); ctx.arc(px+16, py+8, 13, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#1e4030';
        ctx.beginPath(); ctx.arc(px+12, py+6, 8, 0, Math.PI*2); ctx.fill();
        // Moonlit highlights on leaves
        ctx.fillStyle = 'rgba(160,200,180,0.12)';
        ctx.beginPath(); ctx.arc(px+14, py+4, 5, 0, Math.PI*2); ctx.fill();
        break;
      }
      case 1: { // ancient stone wall — crumbling ruin walls with vines
        ctx.fillStyle = '#3a3a4a';
        ctx.fillRect(px, py, T, T);
        // Stone block lines
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 1;
        ctx.strokeRect(px+1, py+1, T/2-1, T/2-1);
        ctx.strokeRect(px+T/2, py+T/2, T/2-1, T/2-1);
        // Crumble texture
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(px, py+T-3, T, 3);
        // Creeping vine
        if (seed < 7) {
          ctx.fillStyle = 'rgba(40,100,50,0.4)';
          ctx.fillRect(px+seed*2, py, 3, T);
          ctx.fillStyle = 'rgba(60,140,70,0.3)';
          ctx.beginPath(); ctx.arc(px+seed*2+1, py+8, 3, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(px+seed*2+2, py+20, 2.5, 0, Math.PI*2); ctx.fill();
        }
        break;
      }
      case 5: { // archway entrance — stone arch with faint rune glow
        ctx.fillStyle = '#2a2a38';
        ctx.fillRect(px, py, T, T);
        // Arch shape
        ctx.fillStyle = '#1a1a28';
        ctx.fillRect(px+6, py+8, 20, 24);
        ctx.beginPath(); ctx.arc(px+16, py+8, 10, Math.PI, 0); ctx.fill();
        // Rune glow on archway
        ctx.fillStyle = 'rgba(100,160,255,0.2)';
        ctx.fillRect(px+4, py+4, 2, 2);
        ctx.fillRect(px+26, py+4, 2, 2);
        ctx.fillRect(px+4, py+14, 2, 2);
        ctx.fillRect(px+26, py+14, 2, 2);
        break;
      }
      case 6: { // canopy roof — dense overhead foliage
        ctx.fillStyle = '#0a1a0e';
        ctx.fillRect(px, py, T, T);
        // Dappled moonlight patches
        ctx.fillStyle = 'rgba(60,100,80,0.15)';
        for (let i = 0; i < 3; i++) {
          const lx = px + 4 + ((seed*5+i*11) % 22);
          const ly = py + 4 + ((seed*3+i*7) % 22);
          ctx.beginPath(); ctx.arc(lx, ly, 3+i, 0, Math.PI*2); ctx.fill();
        }
        break;
      }
      case 18: { // luminous flowers — bioluminescent blooms
        ctx.fillStyle = (x+y)%2 ? '#1e3a2a' : '#1a3326';
        ctx.fillRect(px, py, T, T);
        const fc = ['#6090d0','#8060c0','#40a080','#a080d0','#4080b0'];
        for (let i = 0; i < 5; i++) {
          const fx = px+4+((x*7+i*11)%24);
          const fy = py+4+((y*5+i*13)%24);
          const color = fc[(x+y+i)%fc.length];
          // Glow aura
          ctx.fillStyle = color.replace(')', ',0.15)').replace('rgb', 'rgba');
          ctx.beginPath(); ctx.arc(fx, fy, 6, 0, Math.PI*2); ctx.fill();
          // Flower
          ctx.fillStyle = color;
          ctx.beginPath(); ctx.arc(fx, fy, 2.5, 0, Math.PI*2); ctx.fill();
          // Stem
          ctx.fillStyle = '#1a4a2a';
          ctx.fillRect(fx-0.5, fy+3, 1.2, 5);
        }
        break;
      }
      case 11: { // cave wall — dark crystalline rock
        ctx.fillStyle = '#1a1a2a';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = 'rgba(60,60,100,0.2)';
        ctx.fillRect(px+2, py+2, T-4, T/2-2);
        // Crystal glints
        if (seed < 5) {
          ctx.fillStyle = 'rgba(120,140,220,0.3)';
          ctx.beginPath(); ctx.arc(px+8+seed*3, py+6+seed*2, 2, 0, Math.PI*2); ctx.fill();
        }
        break;
      }
      case 12: { // standing stone — ancient monolith
        ctx.fillStyle = (x+y)%2 ? '#1e3a2a' : '#1a3326';
        ctx.fillRect(px, py, T, T);
        // Tall stone
        ctx.fillStyle = '#5a5a6a';
        ctx.fillRect(px+10, py+4, 12, 24);
        ctx.fillRect(px+8, py+2, 16, 4);
        // Rune carvings
        ctx.fillStyle = 'rgba(100,160,255,0.2)';
        ctx.fillRect(px+13, py+10, 6, 1.5);
        ctx.fillRect(px+14, py+14, 4, 1.5);
        ctx.fillRect(px+12, py+18, 8, 1.5);
        break;
      }
      case 20: { // deep moss / dark grass
        ctx.fillStyle = '#122a1a';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#0e2414';
        if (seed < 8) {
          ctx.fillRect(px+4+seed*2, py+8, 3, 8);
          ctx.fillRect(px+16-seed, py+18, 4, 6);
        }
        // Firefly
        if (seed === 3 || seed === 11) {
          ctx.fillStyle = 'rgba(200,240,140,0.4)';
          ctx.beginPath(); ctx.arc(px+12+seed, py+10, 2, 0, Math.PI*2); ctx.fill();
        }
        break;
      }
      case 19: { // wooden bridge planks
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        for (let i = 0; i < T; i += 6) ctx.fillRect(px, py+i, T, 1);
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.fillRect(px+2, py+2, T-4, 2);
        break;
      }
      case 21: { // mossy cobblestone
        ctx.fillStyle = '#3a4038';
        ctx.fillRect(px, py, T, T);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 1;
        ctx.strokeRect(px+1, py+1, 14, 14);
        ctx.strokeRect(px+16, py+1, 14, 14);
        ctx.strokeRect(px+8, py+16, 14, 14);
        // Moss between stones
        ctx.fillStyle = 'rgba(50,90,50,0.25)';
        ctx.fillRect(px+14, py, 3, T);
        ctx.fillRect(px, py+14, T, 3);
        break;
      }
      case 24: { // mushroom ring (using fence tile)
        ctx.fillStyle = (x+y)%2 ? '#1e3a2a' : '#1a3326';
        ctx.fillRect(px, py, T, T);
        // Glowing mushrooms
        const mc = ['#7a5aaa','#5a7aaa','#8a6aba'];
        for (let i = 0; i < 3; i++) {
          const mx = px+6+i*9, my = py+18-i*3;
          ctx.fillStyle = '#d0c8a0';
          ctx.fillRect(mx+1, my+4, 2, 5);
          ctx.fillStyle = mc[i];
          ctx.beginPath(); ctx.arc(mx+2, my+3, 4, Math.PI, 0); ctx.fill();
          // Glow
          ctx.fillStyle = mc[i].replace(')', ',0.15)').replace('rgb', 'rgba');
          ctx.beginPath(); ctx.arc(mx+2, my+2, 7, 0, Math.PI*2); ctx.fill();
        }
        break;
      }
      default: {
        ctx.fillStyle = (x+y)%2 ? '#1e3a2a' : '#1a3326';
        ctx.fillRect(px, py, T, T);
      }
    }
  },
